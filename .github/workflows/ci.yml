# OptionPlay CI Pipeline
# ======================
# Runs on every push and PR to main branch
#
# Jobs:
# 1. lint: Black, isort, flake8
# 2. type-check: mypy
# 3. security: bandit
# 4. test: pytest with coverage

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install black isort flake8 flake8-bugbear flake8-comprehensions

      - name: Check Black formatting
        run: black --check --line-length=100 src/

      - name: Check isort
        run: isort --check-only --profile=black --line-length=100 src/

      - name: Flake8 linting
        run: flake8 src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install mypy types-PyYAML pydantic

      - name: Run mypy
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional --warn-unreachable --exclude 'tests/' || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Run bandit
        run: bandit -c pyproject.toml -r src/ --severity-level medium --confidence-level high || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,test]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70 -q \
            --ignore=tests/system/test_mcp_server_e2e.py \
            --ignore=tests/system/test_mcp_server_extended.py \
            --ignore=tests/unit/test_outcome_storage_security.py \
            --ignore=tests/component/test_container.py \
            --deselect=tests/component/test_vix_cache.py::TestIsDataStale::test_data_stale_fresh_data \
            --deselect=tests/integration/test_multi_strategy_scanner.py::TestFundamentalsFilter::test_blacklist_filters_symbol \
            --deselect=tests/integration/test_trade_validator.py::TestVixFetchingExtended::test_get_vix_fallback_to_db_on_import_error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Summary job that depends on all others
  ci-success:
    name: CI Success
    needs: [lint, type-check, security, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
