# OptionPlay Pre-commit Configuration
# =====================================
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.0
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # Linting with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-ignore=E203,W503]
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional, --warn-unreachable]
        additional_dependencies:
          - types-PyYAML
          - types-aiohttp
        exclude: ^tests/

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent large files
      - id: check-added-large-files
        args: [--maxkb=500]
      # Check YAML syntax
      - id: check-yaml
        args: [--unsafe]
      # Check JSON syntax
      - id: check-json
      # Detect private keys
      - id: detect-private-key
      # Fix end of files
      - id: end-of-file-fixer
      # Trim trailing whitespace
      - id: trailing-whitespace
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check for debugger imports
      - id: debug-statements
      # Check Python syntax
      - id: check-ast

  # Block .env files from being committed (A.2)
  - repo: local
    hooks:
      - id: forbid-env-files
        name: Block .env files from commit
        entry: bash -c 'echo "ERROR: .env files must not be committed!" && exit 1'
        language: system
        files: '(^|/)\.env(\..+)?$'
        types: [file]

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

# CI Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [mypy]  # mypy can be slow in CI
