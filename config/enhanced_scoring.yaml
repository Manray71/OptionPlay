# Enhanced Scoring Configuration
# ================================
# Bonus components for daily_picks re-ranking.
# Only applies to daily_picks() — regular scans are unaffected.

# Scoring mode: "additive" (legacy) or "multiplicative" (recommended)
# Additive: enhanced = base + sum(bonuses)  — can exceed 10.0 scale
# Multiplicative: enhanced = base × (1 + sum(mults)) — preserves signal quality ordering
mode: multiplicative

# ---------------------------------------------------------------------------
# Additive bonuses (legacy, used when mode: additive)
# ---------------------------------------------------------------------------

liquidity_bonus:
  excellent: 2.0
  good: 2.0
  fair: 1.0
  poor: 0.0

credit_bonus:
  brackets:
    - min_pct: 10.0
      bonus: 1.5
    - min_pct: 7.0
      bonus: 1.0
    - min_pct: 4.0
      bonus: 0.5
  default: 0.0

pullback_bonus:
  both_above: 1.0
  sma200_above_only: 0.5
  default: 0.0

stability_bonus:
  brackets:
    - min_score: 85
      bonus: 1.0
    - min_score: 75
      bonus: 0.5
  default: 0.0

# ---------------------------------------------------------------------------
# Multiplicative bonuses (used when mode: multiplicative)
# enhanced_score = base_score × (1.0 + liq + cred + pull + stab)
# Max factor: 1.0 + 0.10 + 0.08 + 0.05 + 0.05 = 1.28
# ---------------------------------------------------------------------------

multiplicative:
  liquidity:
    excellent: 0.10
    good: 0.07
    fair: 0.03
    poor: 0.0
  credit:
    brackets:
      - min_pct: 10.0
        mult: 0.08
      - min_pct: 7.0
        mult: 0.05
      - min_pct: 4.0
        mult: 0.02
    default: 0.0
  pullback:
    both_above: 0.05
    sma200_above_only: 0.025
    default: 0.0
  stability:
    brackets:
      - min_score: 85
        mult: 0.05
      - min_score: 75
        mult: 0.025
    default: 0.0

quality_filter:
  reject_quality: "poor"

overfetch_factor: 5
