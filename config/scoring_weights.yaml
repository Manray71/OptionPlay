# =============================================================================
# STRATEGY-SPECIFIC STABILITY THRESHOLDS (v3.1: Trained via Iter 5)
# =============================================================================
stability_thresholds:
  # Global fallback (used when strategy-specific not found)
  by_regime:
    low: 70
    normal: 70
    elevated: 80
    danger: 80
    high: 999
  by_sector: {}

  # v3.1: Trained per-strategy thresholds (Iter 5)
  by_strategy:
    pullback:
      by_regime:
        low: 80       # Trained (Iter 5)
        normal: 80
        medium: 90     # Stricter in medium regime
        danger: 80
        elevated: 85
        high: 80
        extreme: 80
      by_sector:
        Technology: -20    # Iter 5: can use lower threshold
        Healthcare: 0
        "Consumer Defensive": -40  # Iter 5: very permissive
        "Financial Services": -40
    bounce:
      by_regime:
        low: 90        # Trained (Iter 5)
        normal: 90
        medium: 90
        danger: 90
        elevated: 90
        high: 90
        extreme: 65    # Much lower in extreme (Iter 5)
      by_sector:
        Technology: -5
        "Financial Services": -5
    ath_breakout:
      by_regime:
        low: 90        # Trained (Iter 5)
        normal: 90
        medium: 90
        danger: 90
        elevated: 90
        high: 90
        extreme: 60    # Much lower in extreme (Iter 5)
      by_sector:
        Technology: -35   # Iter 5: can use much lower
        "Financial Services": -35
        "Consumer Cyclical": -25
    earnings_dip:
      by_regime: {low: 60, normal: 65, danger: 70, elevated: 75, high: 80}
      by_sector: {}  # Kein Sektor-Einfluss (keine Daten)

# =============================================================================
# STRATEGY-SPECIFIC SECTOR MOMENTUM (v3)
# =============================================================================
sector_momentum:
  enabled: true
  cache_ttl_hours: 4
  etf_mapping:
    Technology: XLK
    Healthcare: XLV
    Financials: XLF
    "Consumer Discretionary": XLY
    "Consumer Staples": XLP
    Energy: XLE
    Industrials: XLI
    "Communication Services": XLC
    Utilities: XLU
    Materials: XLB
    "Real Estate": XLRE
  # Global defaults (fallback when no strategy override)
  factor_range:
    min: 0.6
    max: 1.2
  lookback_days:
    short: 30
    long: 60
  component_weights:
    relative_strength_30d: 0.40
    relative_strength_60d: 0.30
    breadth: 0.20
    vol_premium: 0.10

  # v3: per-strategy overrides for factor range and component weights
  strategy_overrides:
    pullback:
      # Trend-folgend → volle Sensitivität
      factor_range: {min: 0.60, max: 1.20}
      component_weights:
        relative_strength_30d: 0.45
        relative_strength_60d: 0.25
        breadth: 0.20
        vol_premium: 0.10
    bounce:
      # Mean-Reversion → moderate Sensitivität
      factor_range: {min: 0.75, max: 1.15}
      component_weights:
        relative_strength_30d: 0.30
        relative_strength_60d: 0.30
        breadth: 0.25
        vol_premium: 0.15
    ath_breakout:
      # Momentum → MAXIMALE Sensitivität
      factor_range: {min: 0.50, max: 1.25}
      component_weights:
        relative_strength_30d: 0.50
        relative_strength_60d: 0.20
        breadth: 0.15
        vol_premium: 0.15
    earnings_dip:
      # Contrarian → MINIMALE Sensitivität
      factor_range: {min: 0.90, max: 1.10}
      component_weights:
        relative_strength_30d: 0.20
        relative_strength_60d: 0.20
        breadth: 0.30
        vol_premium: 0.30

# =============================================================================
# TRAINING CONFIGURATION (v3: per-strategy training parameters)
# =============================================================================
training:
  strategy_configs:
    pullback:
      walk_forward:
        train_months: 9       # Erhöht wegen weniger Daten (912 Trades)
        validation_months: 2
        min_trades: 200
      regularization:
        l2_lambda: 0.03       # Stärker wegen weniger Daten
        max_weight_change: 0.25
        weight_bounds: [0.7, 4.0]
      objective_weights:
        win_rate: 0.40
        avg_profit: 0.30
        max_consecutive_losses: -0.20
        sector_crisis_loss: -0.10

    bounce:
      walk_forward:
        train_months: 9
        validation_months: 3
        min_trades: 120
      regularization:
        l2_lambda: 0.02
        max_weight_change: 0.25
        weight_bounds: [0.5, 4.0]
      objective_weights:
        win_rate: 0.35
        avg_profit: 0.25
        support_accuracy: 0.20
        false_support: -0.20

    ath_breakout:
      walk_forward:
        train_months: 12
        validation_months: 3
        min_trades: 80
      regularization:
        l2_lambda: 0.03
        max_weight_change: 0.20
        weight_bounds: [0.5, 5.0]
      objective_weights:
        win_rate: 0.30
        avg_profit: 0.25
        false_breakout: -0.30
        max_single_loss: -0.15

    earnings_dip:
      walk_forward:
        train_quarters: 4
        validation_quarters: 2
        min_trades: 60
      regularization:
        l2_lambda: 0.05
        max_weight_change: 0.15
        weight_bounds: [0.5, 3.0]
      objective_weights:
        win_rate: 0.30
        avg_profit: 0.35
        max_drawdown: -0.15
        dip_without_recovery: -0.20

# =============================================================================
# Feature-Engineering Thresholds (Step 12)
# =============================================================================
feature_engineering:
  vwap:
    period: 20
    strong_above: 3.0
    above: 1.0
    below: -1.0
    strong_below: -3.0
  market_context:
    sma_short: 20
    sma_medium: 50
  gap:
    size_large: 3.0
    size_medium: 1.0

# =============================================================================
# Parallelization
# =============================================================================
parallelization:
  sector_batch_size: 11
  scan_concurrency: 50
  training_workers: null      # os.cpu_count()
  enable_batch_scoring: false
  strategy_parallel: true     # v3: Trainiere 4 Strategien parallel
