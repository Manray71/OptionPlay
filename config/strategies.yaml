# =========================================================================
# ROLL STRATEGY PARAMETERS (from 2026-01-29 Training)
# =========================================================================
# Optimierte Diagonal-Roll-Parameter für verlustreiche Positionen.
# Roll-Erfolgsraten von 50-66% je nach Strategie.
#
roll_strategy:
  pullback:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 65           # Auf +65 DTE rollen
    dte_extension_max: 74       # Max DTE nach Roll
    max_rolls: 5                # Maximal 5 Rolls
    min_credit_recovery_pct: 0.79   # Mind. 79% Credit Recovery
    support_buffer_pct: 2.7     # 2.7% unter Support
    # Performance: 80.9% WR, 44.3% Roll Success, $2.46 avg P&L

  bounce:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 52           # Auf +52 DTE rollen
    dte_extension_max: 103      # Max DTE nach Roll
    max_rolls: 6                # Maximal 6 Rolls
    min_credit_recovery_pct: 0.49   # Mind. 49% Credit Recovery
    support_buffer_pct: 4.1     # 4.1% unter Support
    # Performance: 87.3% WR, 65.7% Roll Success, $19.69 avg P&L

  ath_breakout:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 88           # Auf +88 DTE rollen
    dte_extension_max: 87       # Max DTE nach Roll
    max_rolls: 5                # Maximal 5 Rolls
    min_credit_recovery_pct: 0.78   # Mind. 78% Credit Recovery
    support_buffer_pct: 2.5     # 2.5% unter Support
    # Performance: 81.2% WR, 62.2% Roll Success, -$2.37 avg P&L

  earnings_dip:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 73           # Auf +73 DTE rollen
    dte_extension_max: 106      # Max DTE nach Roll
    max_rolls: 5                # Maximal 5 Rolls
