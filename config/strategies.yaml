# OptionPlay - Strategy Profiles
# ==============================
# Basisstrategie: Bull-Put-Spread
#   Short Put: Delta -0.20 ±0.03 (Range: 0.17-0.23)
#   Long Put:  Delta -0.05 ±0.02 (Range: 0.03-0.07)
#   DTE: 60-90 Tage
#   Earnings-Buffer: mindestens 45 Tage

# =========================================================================
# SPREAD DEFAULTS (für alle Strategien)
# =========================================================================
spread_defaults:
  short_put:
    delta_target: -0.20
    delta_minimum: -0.17           # PLAYBOOK: ±0.03
    delta_maximum: -0.23
  long_put:
    delta_target: -0.05
    delta_minimum: -0.03           # PLAYBOOK: ±0.02
    delta_maximum: -0.07

profiles:
  # =========================================================================
  # KONSERVATIV - Für ruhige Märkte (VIX < 15)
  # =========================================================================
  conservative:
    name: "Konservativ"
    description: "Niedriges Risiko bei niedrigen Prämien. Für VIX < 15."

    pullback_scoring:
      min_score_for_candidate: 6

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 20
        iv_rank_maximum: 50

    options_analysis:
      expiration:
        dte_minimum: 60               # Basisstrategie: 60-90 Tage
        dte_maximum: 90
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 5.0
      premium:
        minimum_credit_percent: 25

    market_conditions:
      vix_range: [0, 15]

  # =========================================================================
  # STANDARD - Ausgeglichenes Profil (VIX 15-20)
  # =========================================================================
  standard:
    name: "Standard"
    description: "Ausgeglichenes Risiko-Rendite-Profil. Für VIX 15-20."

    pullback_scoring:
      min_score_for_candidate: 5

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 30
        iv_rank_maximum: 70

    options_analysis:
      expiration:
        dte_minimum: 60               # Basisstrategie: 60-90 Tage
        dte_maximum: 90
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 5.0
      premium:
        minimum_credit_percent: 25

    market_conditions:
      vix_range: [15, 20]

  # =========================================================================
  # AGGRESSIV - Für erhöhte Volatilität (VIX 20-30)
  # =========================================================================
  aggressive:
    name: "Moderat Aggressiv"
    description: "Bessere Prämien, erhöhte Vorsicht. Für VIX 20-30."

    pullback_scoring:
      min_score_for_candidate: 5

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 40
        iv_rank_maximum: 80

    options_analysis:
      expiration:
        dte_minimum: 60               # Basisstrategie: 60-90 Tage
        dte_maximum: 90
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 7.5          # Breiterer Spread für Gap-Schutz
      premium:
        minimum_credit_percent: 30

    market_conditions:
      vix_range: [20, 30]

    warnings:
      - "Positionsgrößen reduzieren"
      - "Breitere Spreads nutzen"

  # =========================================================================
  # HIGH_VOL - Für extreme Volatilität / Crash-Modus (VIX > 30)
  # =========================================================================
  high_volatility:
    name: "High Volatility (Crash-Modus)"
    description: "Hohe Prämien, maximale Vorsicht. Für VIX > 30."

    pullback_scoring:
      min_score_for_candidate: 6      # Höhere Qualität

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      price:
        minimum: 50
        maximum: 1500
      implied_volatility:
        iv_rank_minimum: 60
        iv_rank_maximum: 95

    options_analysis:
      expiration:
        dte_minimum: 60               # Basisstrategie: 60-90 Tage
        dte_maximum: 90
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 10.0         # Breiterer Spread für Schutz
      premium:
        minimum_credit_percent: 30

    market_conditions:
      vix_range: [30, 100]

    warnings:
      - "Positionsgrößen auf 50% reduzieren"
      - "Tägliche Portfolio-Überwachung erforderlich"

# =========================================================================
# AUTO-PROFIL LOGIK
# =========================================================================
auto_selection:
  enabled: true
  vix_source: "tradier"
  fallback_profile: "standard"

  vix_mapping:
    - vix_max: 15
      profile: "conservative"
    - vix_max: 20
      profile: "standard"
    - vix_max: 30
      profile: "aggressive"
    - vix_max: 100
      profile: "high_volatility"

# =========================================================================
# EXIT STRATEGY (from Backtest 2026-01-28)
# =========================================================================
# Backtest Results over 621 out-of-sample trades across 343 symbols:
#
# BEST BY SHARPE RATIO (recommended):
#   profit_target: 100%  (hold for max profit)
#   stop_loss: 150%      (wide stop, rarely triggers)
#   dte_exit: 7          (gamma risk management)
#   Win Rate: 75.4%, Avg P&L: 7.15%, Sharpe: 0.127
#
# ALTERNATIVE - Higher Win Rate:
#   profit_target: 50%   (take profits early)
#   stop_loss: 150%
#   dte_exit: 7
#   Win Rate: 85.0%, Avg P&L: 3.54%, Sharpe: 0.085
#
# KEY INSIGHT: Stop-Loss at 100% triggers too often and hurts returns.
#              Wide stop (150%+) lets winning trades recover from drawdowns.
# =========================================================================
exit_strategy:
  # Default: Best risk-adjusted returns (highest Sharpe)
  default:
    profit_target_pct: 100    # Hold to expiration for max profit
    stop_loss_pct: 150        # Wide stop (rarely triggers)
    dte_exit: 7               # Close at 7 DTE (gamma risk)

  # Conservative: Higher win rate, smaller gains
  conservative:
    profit_target_pct: 50
    stop_loss_pct: 150
    dte_exit: 14

  # Aggressive: Max P&L, hold to expiration
  aggressive:
    profit_target_pct: 100    # Hold to expiration for max profit
    stop_loss_pct: 200        # Very wide stop (never triggers)
    dte_exit: 0               # Let it expire

