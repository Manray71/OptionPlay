    support_buffer_pct: 3.5     # 3.5% unter Support
    # Performance: 80.7% WR, 58.3% Roll Success, $4.29 avg P&L

# =========================================================================
# TRAINING SUMMARY (2026-01-29)
# =========================================================================
# Trained on: 340 symbols with 750+ bars (4-5 years historical data)
# Database: 709,516 historical price bars
# VIX data: 1,382 days (2020-2026)
#
# Strategy Results (after optimization with rolls):
#
# PULLBACK:     80.9% Win Rate, 44.3% Roll Success, Sharpe 0.43
# BOUNCE:       87.3% Win Rate, 65.7% Roll Success, Sharpe 4.21
# ATH_BREAKOUT: 81.2% Win Rate, 62.2% Roll Success, Sharpe -0.36
# EARNINGS_DIP: 80.7% Win Rate, 58.3% Roll Success, Sharpe 0.76
#
# Key Findings:
# - BOUNCE strategy performs best with 87.3% WR and 4.21 Sharpe
# - Roll success rates between 44-66% across strategies
# - High VIX regimes (>20) show significantly better performance
# - LOW VIX environments (<15) underperform across all strategies
# =========================================================================

# =========================================================================
# VIX REGIME V2 (Phase 2 — Continuous Interpolation)
# =========================================================================
# Replaces discrete 4-profile system with 7-anchor-point interpolation.
# Feature-flagged: set enabled=true + scanner.enable_regime_v2=true
vix_regime_v2:
  enabled: false  # Set to true to activate v2 in MCP tools
  term_structure_overlay: true  # Contango/backwardation adjustments

# =========================================================================
# SECTOR RELATIVE STRENGTH (Phase 2 — RRG Quadrants)
# =========================================================================
# Replaces SectorCycleService multiplicative factors with additive modifiers.
# Feature-flagged: set enabled=true + scanner.enable_sector_rs=true
sector_rs:
  enabled: false  # Set to true to activate in scanner
  benchmark: "SPY"
  lookback_days: 60
  ema_fast: 10
  ema_slow: 30
  momentum_lookback: 5
  cache_ttl_hours: 8
  score_modifiers:
    leading: 0.5
    improving: 0.3
    weakening: -0.3
    lagging: -0.5

# =========================================================================
# BASISSTRATEGIE ÜBERSICHT
# =========================================================================
# Alle Profile verwenden dieselbe Basisstrategie (Bull-Put-Spread):
#
# SHORT PUT (verkauft):
# - Delta-Target:    -0.20 (±0.03)
# - Delta-Range:     [-0.23, -0.17]
#
# LONG PUT (gekauft):
# - Delta-Target:    -0.05 (±0.02)
# - Delta-Range:     [-0.07, -0.03]
#
# TIMING:
# - DTE:             60-90 Tage
# - Earnings-Buffer: 45 Tage (keine Optionen wenn Earnings < 45 Tage)
#
# =========================================================================
# DYNAMISCHE SPREAD-BREITE
# =========================================================================
# Spread-Breite wird basierend auf Aktienkurs berechnet:
#
# Aktienkurs   | Basis-Spread | Bei VIX 20-30 | Bei VIX >30
# -------------|--------------|---------------|-------------
# < $30        | $1.00        | $1.00         | $2.50
# $30-50       | $2.50        | $2.50         | $5.00
# $50-100      | $5.00        | $7.50         | $10.00
# $100-200     | $5.00        | $7.50         | $10.00
# $200-500     | $10.00       | $15.00        | $20.00
# > $500       | $15.00       | $20.00        | $25.00
#
# Funktion: calculate_spread_width(stock_price, regime) in vix_strategy.py

