# =============================================================================
# Analyzer Thresholds Configuration
# =============================================================================
# Central config for ALL scoring parameters across the 5 strategy analyzers.
# Enables systematic calibration through Walk-Forward testing without
# touching Python code.
#
# Structure: strategy → section → parameter
# Each analyzer loads its section at module-init time via AnalyzerThresholdsConfig.
# =============================================================================

# -----------------------------------------------------------------------------
# PULLBACK STRATEGY
# -----------------------------------------------------------------------------
pullback:
  # Signal strength thresholds (on 0-10 normalized scale)
  signal:
    strong: 7.0
    moderate: 5.0
    min_normalized_score: 3.5

  # Stop loss & targets
  risk:
    stop_buffer: 0.98       # Multiplier on support for stop level
    target_rr_ratio: 2.0    # Risk/reward ratio for target

  # RSI divergence detection
  divergence:
    lookback: 60
    swing_window: 3
    min_bars: 5
    max_bars: 50
    strong_threshold: 0.7   # RSI divergence ratio for "strong"
    moderate_threshold: 0.4

  # Divergence scoring
  divergence_scoring:
    strong_pts: 3.0
    moderate_pts: 2.0
    weak_pts: 1.0

  # Support/resistance detection
  support:
    window: 5
    max_levels: 5
    tolerance_pct: 1.5
    strong_bonus: 0.5
    strong_extra_touches: 2

  resistance:
    lookback: 60
    window: 5
    max_levels: 5
    tolerance_pct: 1.5

  # Gap detection
  gap:
    warning_min_pct: -3.0
    warning_max_pct: -1.0

  # Moving Average scoring
  ma_scoring:
    dip_in_uptrend: 2.0

  # Keltner Channel scoring
  keltner:
    lower_third_mult: 0.5

  # VWAP scoring
  vwap:
    strong_above_pts: 3.0
    above_pts: 2.0
    near_pts: 1.0

  # Market context scoring
  market_context:
    strong_uptrend: 2.0
    uptrend: 1.0
    downtrend: -0.5
    strong_downtrend: -1.0

  # Sector scoring thresholds
  sector:
    strong_threshold: 0.5
    weak_threshold: -0.5


# -----------------------------------------------------------------------------
# SUPPORT BOUNCE STRATEGY
# -----------------------------------------------------------------------------
bounce:
  # General
  general:
    support_lookback: 120
    support_tolerance_pct: 1.0
    proximity_max_above_pct: 7.0    # was 5.0 — wider window to catch more setups
    proximity_max_below_pct: -1.0   # was -0.5 — allow slightly broken support
    dcb_threshold: 0.5              # was 0.7 — less aggressive DCB filter
    min_score: 3.5
    max_score: 10.0

  # Signal strength
  signal:
    strong: 7.0
    moderate: 5.0

  # Support quality scoring
  support_quality:
    touches_strong: 5
    touches_moderate: 4
    touches_established: 3
    score_strong: 2.0
    score_moderate: 1.5
    score_established: 1.0
    sma200_confluence_bonus: 0.5
    quality_max: 2.5

  # Proximity scoring
  proximity:
    tier1_pct: 1.0
    tier2_pct: 2.0
    tier3_pct: 3.0
    tier4_pct: 5.0
    score_at: 2.0
    score_near: 1.5
    score_close: 1.0
    score_far: 0.5
    score_below: 1.0

  # Volume scoring
  volume:
    strong_ratio: 2.0
    moderate_ratio: 1.5
    adequate_ratio: 1.0
    score_strong: 1.5
    score_moderate: 1.0
    score_adequate: 0.5
    dcb_penalty: -1.0

  # Trend context scoring
  trend:
    sma200_rising_mult: 1.001
    sma200_falling_mult: 0.999
    sma200_direction_lookback: 20
    sma200_near_pct: 2.0
    score_uptrend: 1.5
    score_above_sma200: 1.0
    score_near_sma200: 0.5
    slope_steep: -1.0
    score_steep_down: -2.0
    slope_moderate: -0.5
    score_mod_down: -1.5
    score_mild_down: -1.0
    score_below_sma200: -0.5

  # Bounce confirmation
  confirmation:
    score_reversal: 1.0
    score_close_up: 0.5
    score_green_seq: 1.0
    rsi_oversold: 40
    score_rsi_turn: 0.5
    score_macd_cross: 0.5
    score_macd_pos: 0.25
    penalty_momentum: -0.5
    penalty_macd: -0.5
    confirm_max: 2.5

  # Fibonacci DCB filter (B1)
  fibonacci:
    dcb_warning: 38.2        # Below this: DCB warning
    strong_threshold: 50.0   # Above this: bonus
    weak_threshold: 23.6     # Below this: penalty
    lookback_high: 30        # Days to search for swing high
    lookback_low: 10         # Days to search for swing low
    strong_bonus: 0.5
    weak_penalty: -0.5

  # SMA reclaim (B2)
  sma_reclaim:
    sma20_bonus: 0.5
    sma50_bonus: 0.25
    below_both_penalty: -0.25

  # Candlestick pattern detection
  candlestick:
    hammer_wick_body_ratio: 2
    hammer_upper_wick_pct: 0.5
    doji_body_range_pct: 0.1
    doji_support_pct: 0.02

  # SMA confluence
  sma_confluence:
    sma200_pct: 0.02

  # DCB filter
  dcb:
    rsi_overbought: 70

  # RSI momentum
  rsi:
    momentum_fade: 50

  # RSI bullish divergence (B3)
  rsi_divergence:
    lookback: 20
    threshold: 2.0
    bonus: 0.75

  # Downtrend filter (B4)
  downtrend_filter:
    disqualify_below_sma200_pct: 10.0
    severe_penalty: -2.5

  # Market context modifier (B5) — disabled by default
  market_context:
    enabled: false
    bearish_multiplier: 0.8
    neutral_multiplier: 0.9
    sector_weak_multiplier: 0.9

  # Bollinger Band confluence (B6) — disabled by default
  bollinger:
    enabled: false
    confluence_tolerance_pct: 1.0
    confluence_bonus: 0.25


# -----------------------------------------------------------------------------
# EARNINGS DIP STRATEGY
# -----------------------------------------------------------------------------
earnings_dip:
  # General
  general:
    min_dip_pct: 5.0
    max_dip_pct: 20.0
    extreme_dip_pct: 25.0
    lookback_days: 10
    min_stabilization_days: 1
    min_stability_score: 60.0
    min_score: 3.5
    max_score: 9.5

  # Signal strength
  signal:
    strong: 6.5
    moderate: 5.0

  # Drop magnitude scoring tiers
  drop_magnitude:
    minor_pct: 7.0
    moderate_pct: 10.0
    major_pct: 15.0
    score_small: 0.5
    score_moderate: 1.0
    score_good: 1.5
    score_ideal: 2.0
    score_extreme: 1.0

  # Stabilization scoring
  stabilization:
    score_green_multi: 1.5
    score_green_single: 1.0
    score_higher_low: 1.0
    score_vol_decline: 0.5
    score_hammer: 0.5
    score_max: 2.5

  # Fundamental strength scoring
  fundamentals:
    stability_very_high: 90
    stability_high: 80
    stability_moderate: 70
    score_very_high: 1.5
    score_high: 1.0
    score_moderate: 0.5
    score_sma200: 0.5
    score_max: 2.0

  # Overreaction indicators
  overreaction:
    rsi_extreme_oversold: 30
    rsi_moderate_oversold: 40
    component_score: 0.5
    panic_volume_multiplier: 3.0
    historical_move_multiplier: 2.0
    score_max: 2.0

  # BPS suitability
  bps:
    earnings_score: 0.5

  # Penalties
  penalties:
    under_sma200: 1.0
    continued_decline: 1.5
    new_lows_min: 2
    rsi_not_extreme: 0.5
    penalty_max: 3.0

  # Stabilization detection
  stabilization_detection:
    volume_decline_ratio: 0.7
    hammer_lower_wick_ratio: 0.6
    hammer_body_ratio: 0.3
    hammer_approx_ratio: 0.7

  # B1: Relative dip scoring via Z-Score
  relative_scoring:
    zscore_extreme: 3.0       # Z >= 3.0 → likely fundamental, score 1.0
    zscore_ideal: 2.0         # Z >= 2.0 → ideal overreaction, score 2.0
    zscore_good: 1.5          # Z >= 1.5 → good, score 1.5
    zscore_moderate: 1.0      # Z >= 1.0 → moderate, score 1.0
    zscore_small: 0.5         # Z < 1.0 → small, score 0.5
    score_extreme: 1.0
    score_ideal: 2.0
    score_good: 1.5
    score_moderate: 1.0
    score_small: 0.5

  # B2: Sector context for overreaction scoring
  sector_context:
    defensive_threshold: 1.05   # Sector factor above this = defensive
    volatile_threshold: 0.95    # Sector factor below this = volatile
    defensive_bonus: 0.5
    neutral_bonus: 0.25
    volatile_bonus: 0.0
    earnings_beat_rate_threshold: 75  # Beat rate >= 75% → +0.25 bonus
    earnings_beat_rate_bonus: 0.25

  # B3: Dynamic stabilization timing
  stabilization_timing:
    min_days_small: 2          # Default for drops < large_dip_threshold
    min_days_large: 3          # For drops >= large_dip_threshold
    large_dip_threshold: 15.0  # Dip % threshold for longer stabilization

  # B4: Graduated continued-decline penalty
  continued_decline:
    mild_threshold_pct: 2.0    # Max decline <= 2% → mild penalty
    moderate_threshold_pct: 5.0  # Max decline <= 5% → moderate penalty
    mild_penalty: 0.5
    moderate_penalty: 1.0
    severe_penalty: 1.5        # 3+ new lows or > 5% decline

  # B5: Contextual RSI penalty
  rsi_penalty:
    recovery_threshold: 55     # RSI <= 55 in uptrend → no penalty

  # B7: Dynamic recovery target
  recovery_target:
    strong_pct: 60             # Recovery % for STRONG signals
    default_pct: 50            # Default recovery %
    weak_pct: 40               # Recovery % for WEAK signals


# -----------------------------------------------------------------------------
# ATH BREAKOUT STRATEGY
# -----------------------------------------------------------------------------
ath_breakout:
  # General
  general:
    consol_lookback: 120
    consol_min_days: 20
    consol_max_range_pct: 15.0
    consol_ath_test_pct: 1.0
    volume_disqualify: 1.0
    rsi_disqualify: 80.0
    min_score: 4.0
    max_score: 9.5

  # Signal strength
  signal:
    strong: 7.0
    moderate: 5.5

  # Consolidation scoring
  consolidation:
    range_tight_pct: 8.0
    range_moderate_pct: 12.0
    range_wide_pct: 15.0
    duration_min: 30
    duration_very_long: 60
    score_tight_long: 2.5
    score_tight_short: 2.0
    score_mod_long: 2.0
    score_mod_short: 1.5
    score_wide: 1.0
    test_min: 2
    test_bonus: 0.5
    score_max: 3.0
    window_step: 5

  # VCP volatility contraction (A1)
  vcp:
    contraction_strong: 2.0
    contraction_moderate: 1.5
    contraction_bonus_strong: 0.5
    contraction_bonus_moderate: 0.25
    expanding_penalty: -0.25

  # Breakout strength
  breakout:
    weak_pct: 1.0
    moderate_pct: 3.0
    strong_pct: 5.0
    score_weak: 1.0
    score_moderate: 1.5
    score_strong: 2.0
    score_overextended: 1.5
    days_bonus_min: 2
    confirmation_bonus: 0.5
    score_max: 2.5

  # Candle analysis (breakout bar quality)
  candle_analysis:
    marubozu_wick_max_pct: 5.0     # Max upper wick % of range for marubozu
    wide_range_atr_mult: 1.5       # ATR multiplier for wide range bar
    close_near_high_threshold: 0.8 # Close position > 80% of range
    long_wick_threshold: 0.5       # Upper wick > 50% of range = penalty
    marubozu_bonus: 0.5
    wide_range_bonus: 0.25
    close_high_bonus: 0.25
    long_wick_penalty: -0.5

  # Gap analysis (A5)
  gap_analysis:
    power_threshold_pct: 3.0
    standard_threshold_pct: 1.0
    power_bonus: 0.5
    standard_bonus: 0.25
    reversal_bonus: 0.25

  # Consolidation volume profile (A2)
  consol_volume:
    dryup_strong: 1.5
    dryup_moderate: 1.2
    distribution_threshold: 0.8
    dryup_strong_bonus: 0.5
    dryup_moderate_bonus: 0.25
    distribution_penalty: -0.25

  # Volume scoring
  volume:
    exceptional_ratio: 2.5
    strong_ratio: 2.0
    good_ratio: 1.5
    adequate_ratio: 1.0
    score_exceptional: 2.5
    score_strong: 2.0
    score_good: 1.5
    score_adequate: 0.5
    score_weak: -1.0

  # Relative strength vs SPY (A3)
  relative_strength:
    lookback_days: 60
    strong_outperformance: 20.0
    moderate_outperformance: 10.0
    underperformance: -10.0
    strong_bonus: 0.5
    moderate_bonus: 0.25
    underperformance_penalty: -0.5

  # Momentum/Trend scoring
  momentum:
    sma_perfect_bonus: 0.5
    sma_good_bonus: 0.25
    sma200_decline_mult: 0.999
    sma200_decline_penalty: 0.5
    sma200_lookback: 20
    macd_bonus: 0.5
    rsi_healthy_low: 50
    rsi_healthy_high: 70
    rsi_healthy_bonus: 0.5
    rsi_overbought: 75
    rsi_overbought_penalty: 0.5
    score_min: -1.5
    score_max: 2.0

  # Stop loss
  stop_loss:
    recent_low_days: 10
    max_pct: 0.95


# -----------------------------------------------------------------------------
# TREND CONTINUATION STRATEGY
# -----------------------------------------------------------------------------
trend_continuation:
  # General
  general:
    min_score: 5.0
    max_score: 10.5

  # SMA periods
  sma:
    short: 20
    med: 50
    long: 200

  # SMA slope lookback (in days)
  sma_slope:
    short_days: 5
    med_days: 10
    long_days: 20

  # Trend stability
  stability:
    lookback: 60
    max_closes_below_sma50: 5

  # Disqualification thresholds
  disqualification:
    min_buffer_pct: 3.0
    rsi_overbought: 80
    adx_min: 15
    min_stability_score: 70
    min_earnings_days: 14

  # Volume
  volume:
    avg_period: 20

  # Risk management
  risk:
    stop_below_sma50_pct: 2.0
    target_risk_reward: 2.0

  # SMA alignment scoring (0-2.5)
  sma_alignment_scoring:
    all_rising: 2.0
    partial_rising: 1.5     # SMA 50+200 rising, SMA 20 flat/falling
    basic: 1.0              # Basic alignment without all rising
    spread_bonus_above: 5.0  # Spread > 5% → +0.5
    spread_penalty_below: 3.0  # Spread < 3% → -0.5
    sma20_penalty: 0.5      # Penalty when SMA 20 not rising
    max: 2.5

  # Trend stability scoring (0-2.5)
  trend_stability_scoring:
    zero_closes_below: 2.0
    few_closes_below: 1.5   # 1-2 closes below SMA 50
    many_closes_below: 0.5  # 3+ closes below SMA 50
    golden_cross_days: 120
    golden_cross_bonus: 0.5
    max: 2.5

  # Trend buffer scoring (0-2.0)
  buffer_scoring:
    tier1_pct: 10.0   # > 10% → 2.0
    tier1_score: 2.0
    tier2_pct: 8.0     # 8-10% → 1.5
    tier2_score: 1.5
    tier3_pct: 5.0     # 5-8% → 1.0
    tier3_score: 1.0
    tier4_pct: 3.0     # 3-5% → 0.5
    tier4_score: 0.5

  # Momentum health scoring (-1.0 to 2.0)
  momentum_scoring:
    rsi_low: 50.0
    rsi_mid: 65.0
    rsi_high: 75.0
    rsi_bonus: 0.5
    rsi_penalty: -0.5
    adx_strong: 35.0
    adx_moderate: 25.0
    adx_strong_bonus: 1.0
    adx_moderate_bonus: 0.5
    macd_bullish_bonus: 0.5
    macd_divergence_penalty: -1.0
    volume_divergence_penalty: -0.5
    score_min: -1.0
    score_max: 2.0

  # Volatility scoring (0-1.5)
  volatility_scoring:
    atr_low: 1.0       # ATR% < 1.0% → 1.5
    atr_mid: 1.5       # ATR% 1.0-1.5% → 1.0
    atr_high: 2.0      # ATR% 1.5-2.0% → 0.5
    score_low: 1.5
    score_mid: 1.0
    score_high: 0.5
    score_unknown: 0.5  # Default when ATR unknown

  # VIX regime adjustments (multipliers)
  vix_adjustment:
    low: 1.05
    normal: 1.00
    elevated: 0.90
    high: 0.0           # Deactivated in high VIX
