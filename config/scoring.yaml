    zone_high: 80
    score_low: 30
    score_mid: 70
    mult_low: 1.0
    mult_mid: 2.0
    mult_high: 1.0
    decay_mult: 1.5
    floor: 50.0

  # Credit Ratio scoring
  credit:
    mid_pct: 15
    high_pct: 25
    mult_low: 12
    score_mid: 60
    mult_high: 4

  # Theta Efficiency scoring
