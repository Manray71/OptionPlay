# ===========================================================================
# ENHANCED SCORING (from enhanced_scoring.yaml)
# ===========================================================================
# Enhanced Scoring Configuration
# ================================
# Bonus components for daily_picks re-ranking.
# Only applies to daily_picks() — regular scans are unaffected.

# Scoring mode: "additive" (legacy) or "multiplicative" (recommended)
# Additive: enhanced = base + sum(bonuses)  — can exceed 10.0 scale
# Multiplicative: enhanced = base × (1 + sum(mults)) — preserves signal quality ordering
mode: multiplicative

# ---------------------------------------------------------------------------
# Additive bonuses (legacy, used when mode: additive)
# ---------------------------------------------------------------------------

liquidity_bonus:
  excellent: 2.0
  good: 2.0
  fair: 1.0
  poor: 0.0

credit_bonus:
  brackets:
    - min_pct: 10.0
      bonus: 1.5
    - min_pct: 7.0
      bonus: 1.0
    - min_pct: 4.0
      bonus: 0.5
  default: 0.0

pullback_bonus:
  both_above: 1.0
  sma200_above_only: 0.5
  default: 0.0

stability_bonus:
  brackets:
    - min_score: 85
      bonus: 1.0
    - min_score: 75
      bonus: 0.5
  default: 0.0

# ---------------------------------------------------------------------------
# Multiplicative bonuses (used when mode: multiplicative)
# enhanced_score = base_score × (1.0 + liq + cred + pull + stab)
# Max factor: 1.0 + 0.10 + 0.08 + 0.05 + 0.05 = 1.28
# ---------------------------------------------------------------------------

multiplicative:
  liquidity:
    excellent: 0.10
    good: 0.07
    fair: 0.03
    poor: 0.0
  credit:
    brackets:
      - min_pct: 10.0
        mult: 0.08
      - min_pct: 7.0
        mult: 0.05
      - min_pct: 4.0
        mult: 0.02
    default: 0.0
  pullback:
    both_above: 0.05
    sma200_above_only: 0.025
    default: 0.0
  stability:
    brackets:
      - min_score: 85
        mult: 0.05
      - min_score: 75
        mult: 0.025
    default: 0.0

quality_filter:
  reject_quality: "poor"

overfetch_factor: 5

# ===========================================================================
# RSI THRESHOLDS (from rsi_thresholds.yaml)
# ===========================================================================
# RSI Thresholds by Stability Score
# Based on 35-symbol validation study (Feb 2026)
# Median RSI: 40.4 across all stability levels
#
# Problem: Fixed RSI neutral threshold of 50 penalizes 34% of profitable
# setups (88.6% Win Rate in RSI 40-50 range for stable stocks).
# Solution: Adaptive thresholds based on stock stability score.

rsi_thresholds:
  description: "Adaptive RSI thresholds based on stock stability"
  validation_date: "2026-02-13"
  sample_size: 35

  # Stability-based threshold tiers (checked in descending order)
  # The threshold defines where "normal pullback" begins.
  # RSI below threshold gets oversold penalty; RSI at/above threshold
  # up to 50 is considered a normal pullback (no penalty).
  tiers:
    - name: high_stability
      min_stability: 85
      neutral_threshold: 50
      rationale: "Stable stocks (85+): RSI 40-50 is normal pullback territory, not penalty zone"

    - name: medium_stability
      min_stability: 70
      neutral_threshold: 45
      rationale: "Medium stability (70-84): RSI up to 45 still qualifies as pullback"

    - name: low_stability
      min_stability: 60
      neutral_threshold: 40
      rationale: "Lower stability stocks need clearer oversold signal"

    - name: very_low_stability
      min_stability: 0
      neutral_threshold: 35
      rationale: "Very volatile stocks need lower threshold to avoid false signals"

  # RSI score adjustments applied by pullback scoring
  scoring:
    severe_oversold:
      max_rsi: 30
      penalty: -1.5
      description: "Extremely oversold, potential falling knife"

    overbought:
      min_rsi: 70
      penalty: -0.5
      description: "Overbought territory, may reverse"

# ===========================================================================
# VALIDATION CONFIG (from validation_config.yaml)
# ===========================================================================
# Validation & Reliability Configuration
# =======================================
# Parameters for backtesting validation, reliability scoring,
# and statistical analysis. Tunable for Walk-Forward optimization.

# =============================================================================
# RELIABILITY SCORING (from reliability.py ScorerConfig)
# =============================================================================
reliability:
  grade_thresholds:
    A: 70.0                      # CI lower bound >= this = Grade A
    B: 60.0
    C: 50.0
    D: 40.0                      # Below D = Grade F
  min_grade_for_trade: "C"       # Minimum grade to recommend trade
  min_score: 5.0                 # Minimum signal score
  min_sample_size: 30            # Min trades for confidence

# =============================================================================
# STATISTICAL ANALYSIS (from statistical_calc.py)
# =============================================================================
statistical:
  # Sharpe ratio defaults
  risk_free_rate: 0.05           # Annualized risk-free rate (5%)
  periods_per_year: 12.0         # Assumed periods per year (monthly)
  # Correlation predictive power brackets
  significance_p_value: 0.05     # Max p-value for significance
  correlation_strength:
    strong: 0.5                  # |r| >= this = "strong"
    moderate: 0.3                # |r| >= this = "moderate"
    weak: 0.1                    # |r| >= this = "weak"

# =============================================================================
# SIGNAL VALIDATION (from signal_validation.py)
# =============================================================================
signal_validation:
  min_trades_per_bucket: 30      # Min trades per score bucket for significance
