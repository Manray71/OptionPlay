# =============================================================================
# RANKING & RECOMMENDATION
# =============================================================================
# Parameters for DailyRecommendationEngine ranking formula and speed scoring.

ranking:
  # Ranking formula: base = (1-stability_weight)*signal + stability_weight*(stability/10)
  # combined = base * speed_normalized^speed_exponent + event_bonus
  stability_weight: 0.15       # 15% stability, 85% signal (was 0.3 — reduced to avoid triple-counting)
  speed_exponent: 0.3          # Speed^0.3 multiplier (PLAYBOOK)
  min_signal_score: 3.5        # Minimum for ranking (not filtering)
  stability_warning: 70        # Warning threshold for stability

  # Speed scoring component weights (sum → speed_score_max)
  speed:
    dte_optimal: 60
    dte_range: 30
    dte_weight: 3.0
    stability_baseline: 70
    stability_range: 30
    stability_weight: 2.5
    sector_weight: 1.5
    pullback_weight: 1.5
    market_context_weight: 1.5
    score_max: 10.0
    multiplier_min: 0.5        # Speed 0 → 0.5x multiplier

  # Strike fallback support percentages
  strike_support:
    pct_1: 0.90
    pct_2: 0.85
    pct_3: 0.80

  # Strategy Balance (Event-Priority-System)
  strategy_balance:
    # Event-Bonus: seltene, zeitkritische Signale werden leicht bevorzugt
    signal_type_bonus:
      pullback: 0.5
      bounce: 0.5
      ath_breakout: 0.5
      earnings_dip: 0.5
      trend_continuation: 0.0
    # Capacity Limits: max Signale pro Strategie in daily_picks
    strategy_caps:
      trend_continuation: 3
      default: 5
    # Diversity: Mindestens N verschiedene Strategien in Top-N
    min_strategies_in_picks: 2

  # Sector speed map (avg days_to_playbook_exit, 0.0=fastest, 1.0=slowest)
  sector_speed:
    Utilities: 1.0
    Healthcare: 0.9
    Real Estate: 0.85
    Consumer Defensive: 0.7
    Financial Services: 0.6
    Industrials: 0.5
    Consumer Cyclical: 0.4
    Communication Services: 0.3
    Energy: 0.2
    Technology: 0.1
    Basic Materials: 0.0

# =============================================================================
# ENTRY QUALITY SCORER (EQS)
# =============================================================================
# Parameters for the 7-factor Entry Quality Score.
# EQS provides up to 30% bonus to signal score for ranking.

entry_quality:
  # General limits
  score_max: 100.0
  score_neutral: 50.0
  bonus_max_pct: 0.3           # 30% max bonus to signal score

  # Factor weights (must sum to 1.0)
  weights:
    iv_rank: 0.20
    iv_percentile: 0.15
    credit_ratio: 0.20
    theta_efficiency: 0.15
    pullback: 0.15
    rsi: 0.10
    trend: 0.05

  # IV Rank scoring zones
  iv_rank:
    zone_low: 20
    zone_mid_low: 40
    zone_mid_high: 65
    zone_high: 80
    mult_low: 2.5              # 0→0, 20→50
    mult_mid_low: 1.5          # 20→50, 40→80
    mult_mid_high: 0.8         # 40→80, 65→100
    mult_high: 1.333           # 65→100, 80→80
    floor: 30.0

  # IV Percentile scoring zones
  iv_percentile:
    zone_low: 30
    zone_mid: 50
    zone_high: 80
    score_low: 30
    score_mid: 70
    mult_low: 1.0
    mult_mid: 2.0
    mult_high: 1.0
    decay_mult: 1.5
    floor: 50.0

  # Credit Ratio scoring
  credit:
    mid_pct: 15
    high_pct: 25
    mult_low: 12
    score_mid: 60
    mult_high: 4

  # Theta Efficiency scoring
  theta:
    pct_conversion: 100
    multiplier: 25

  # Pullback scoring zones
  pullback:
    zone_minimal: 1
    zone_shallow: 3
    zone_sweet: 8
    zone_deep: 12
    score_minimal: 20
    mult_shallow: 20
    mult_sweet: 8
    mult_deep: 10
    floor: 30.0

  # RSI scoring zones
  rsi:
    zone_very_low: 25
    zone_oversold: 35
    zone_neutral: 50
    zone_overbought: 70
    score_oversold: 70
    score_neutral: 40
    score_overbought: 20
    mult_oversold: 3
    mult_neutral: 2

  # Trend scoring
  trend:
    bullish: 100.0
    bearish: 30.0

# ===========================================================================
# ANALYZER THRESHOLDS (from analyzer_thresholds.yaml)
# ===========================================================================
# =============================================================================
# Analyzer Thresholds Configuration
# =============================================================================
# Central config for ALL scoring parameters across the 5 strategy analyzers.
# Enables systematic calibration through Walk-Forward testing without
# touching Python code.
#
# Structure: strategy → section → parameter
# Each analyzer loads its section at module-init time via AnalyzerThresholdsConfig.
# =============================================================================

# -----------------------------------------------------------------------------
# PULLBACK STRATEGY
# -----------------------------------------------------------------------------
pullback:
  # Dynamic max cap for normalization (P95 empirical max)
  effective_max: 14.0

  # Signal strength thresholds (on 0-10 normalized scale)
  signal:
    strong: 7.0
    moderate: 5.0
    min_normalized_score: 3.5

  # Stop loss & targets
  risk:
    stop_buffer: 0.98       # Multiplier on support for stop level
    target_rr_ratio: 2.0    # Risk/reward ratio for target

  # RSI divergence detection
  divergence:
    lookback: 60
    swing_window: 3
    min_bars: 5
    max_bars: 50
    strong_threshold: 0.7   # RSI divergence ratio for "strong"
    moderate_threshold: 0.4

  # Divergence scoring
  divergence_scoring:
    strong_pts: 3.0
    moderate_pts: 2.0
    weak_pts: 1.0

  # Support/resistance detection
  support:
    window: 5
    max_levels: 5
    tolerance_pct: 1.5
    strong_bonus: 0.5
    strong_extra_touches: 2

  resistance:
    lookback: 60
    window: 5
    max_levels: 5
    tolerance_pct: 1.5

  # Gap detection
  gap:
    warning_min_pct: -3.0
    warning_max_pct: -1.0

  # Moving Average scoring
  ma_scoring:
    dip_in_uptrend: 2.0

  # Keltner Channel scoring
  keltner:
    lower_third_mult: 0.5

  # VWAP scoring
  vwap:
    strong_above_pts: 3.0
    above_pts: 2.0
    near_pts: 1.0

  # Market context scoring
  market_context:
    strong_uptrend: 2.0
    uptrend: 1.0
    downtrend: -0.5
    strong_downtrend: -1.0

  # Sector scoring thresholds
  sector:
    strong_threshold: 0.5
    weak_threshold: -0.5


# -----------------------------------------------------------------------------
# SUPPORT BOUNCE STRATEGY
# -----------------------------------------------------------------------------
bounce:
  # General
  general:
    support_lookback: 120
    support_tolerance_pct: 1.0
    proximity_max_above_pct: 7.0    # was 5.0 — wider window to catch more setups
    proximity_max_below_pct: -1.0   # was -0.5 — allow slightly broken support
    dcb_threshold: 0.5              # was 0.7 — less aggressive DCB filter
    min_score: 3.5
    max_score: 10.0

  # Signal strength
  signal:
    strong: 7.0
    moderate: 5.0

  # Support quality scoring
  support_quality:
    touches_strong: 5
    touches_moderate: 4
    touches_established: 3
    score_strong: 2.0
    score_moderate: 1.5
    score_established: 1.0
    sma200_confluence_bonus: 0.5
    quality_max: 2.5

  # Proximity scoring
  proximity:
    tier1_pct: 1.0
    tier2_pct: 2.0
    tier3_pct: 3.0
    tier4_pct: 5.0
    score_at: 2.0
    score_near: 1.5
    score_close: 1.0
    score_far: 0.5
    score_below: 1.0

  # Volume scoring
  volume:
    strong_ratio: 2.0
    moderate_ratio: 1.5
    adequate_ratio: 1.0
    score_strong: 1.5
    score_moderate: 1.0
    score_adequate: 0.5
    dcb_penalty: -1.0

  # Trend context scoring
  trend:
    sma200_rising_mult: 1.001
    sma200_falling_mult: 0.999
    sma200_direction_lookback: 20
    sma200_near_pct: 2.0
    score_uptrend: 1.5
    score_above_sma200: 1.0
    score_near_sma200: 0.5
    slope_steep: -1.0
    score_steep_down: -2.0
    slope_moderate: -0.5
    score_mod_down: -1.5
    score_mild_down: -1.0
    score_below_sma200: -0.5

  # Bounce confirmation
  confirmation:
    score_reversal: 1.0
    score_close_up: 0.5
    score_green_seq: 1.0
    rsi_oversold: 40
    score_rsi_turn: 0.5
    score_macd_cross: 0.5
    score_macd_pos: 0.25
    penalty_momentum: -0.5
    penalty_macd: -0.5
    confirm_max: 2.5

  # Fibonacci DCB filter (B1)
  fibonacci:
    dcb_warning: 38.2        # Below this: DCB warning
    strong_threshold: 50.0   # Above this: bonus
    weak_threshold: 23.6     # Below this: penalty
    lookback_high: 30        # Days to search for swing high
    lookback_low: 10         # Days to search for swing low
    strong_bonus: 0.5
    weak_penalty: -0.5

  # SMA reclaim (B2)
  sma_reclaim:
    sma20_bonus: 0.5
    sma50_bonus: 0.25
    below_both_penalty: -0.25

  # Candlestick pattern detection
  candlestick:
    hammer_wick_body_ratio: 2
