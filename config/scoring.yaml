# ===========================================================================
# ANALYZER THRESHOLDS (from analyzer_thresholds.yaml)
# ===========================================================================
# =============================================================================
# Analyzer Thresholds Configuration
# =============================================================================
# Central config for ALL scoring parameters across the 5 strategy analyzers.
# Enables systematic calibration through Walk-Forward testing without
# touching Python code.
#
# Structure: strategy → section → parameter
# Each analyzer loads its section at module-init time via AnalyzerThresholdsConfig.
# =============================================================================

# -----------------------------------------------------------------------------
# PULLBACK STRATEGY
# -----------------------------------------------------------------------------
pullback:
  # Dynamic max cap for normalization (P95 empirical max)
  effective_max: 14.0

  # Signal strength thresholds (on 0-10 normalized scale)
  signal:
    strong: 7.0
    moderate: 5.0
    min_normalized_score: 3.5

  # Stop loss & targets
  risk:
    stop_buffer: 0.98       # Multiplier on support for stop level
    target_rr_ratio: 2.0    # Risk/reward ratio for target

  # RSI divergence detection
  divergence:
    lookback: 60
    swing_window: 3
    min_bars: 5
    max_bars: 50
    strong_threshold: 0.7   # RSI divergence ratio for "strong"
    moderate_threshold: 0.4

  # Divergence scoring
  divergence_scoring:
    strong_pts: 3.0
    moderate_pts: 2.0
    weak_pts: 1.0

  # Support/resistance detection
  support:
    window: 5
    max_levels: 5
    tolerance_pct: 1.5
    strong_bonus: 0.5
    strong_extra_touches: 2

  resistance:
    lookback: 60
    window: 5
    max_levels: 5
    tolerance_pct: 1.5

  # Gap detection
  gap:
    warning_min_pct: -3.0
    warning_max_pct: -1.0

  # Moving Average scoring
  ma_scoring:
    dip_in_uptrend: 2.0

  # Keltner Channel scoring
  keltner:
    lower_third_mult: 0.5

  # VWAP scoring
  vwap:
    strong_above_pts: 3.0
    above_pts: 2.0
    near_pts: 1.0

  # Market context scoring
  market_context:
    strong_uptrend: 2.0
    uptrend: 1.0
    downtrend: -0.5
    strong_downtrend: -1.0

  # Sector scoring thresholds
  sector:
    strong_threshold: 0.5
    weak_threshold: -0.5


