# =========================================================================
# ROLL STRATEGY PARAMETERS (from 2026-01-29 Training)
# =========================================================================
# Optimierte Diagonal-Roll-Parameter für verlustreiche Positionen.
# Roll-Erfolgsraten von 50-66% je nach Strategie.
#
roll_strategy:
  pullback:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 65           # Auf +65 DTE rollen
    dte_extension_max: 74       # Max DTE nach Roll
    max_rolls: 5                # Maximal 5 Rolls
    min_credit_recovery_pct: 0.79   # Mind. 79% Credit Recovery
    support_buffer_pct: 2.7     # 2.7% unter Support
    # Performance: 80.9% WR, 44.3% Roll Success, $2.46 avg P&L

  bounce:
    trigger_pct: -50.0          # Roll bei -50% Verlust
    dte_extension: 52           # Auf +52 DTE rollen
    dte_extension_max: 103      # Max DTE nach Roll
    max_rolls: 6                # Maximal 6 Rolls
    min_credit_recovery_pct: 0.49   # Mind. 49% Credit Recovery
    support_buffer_pct: 4.1     # 4.1% unter Support
    # Performance: 87.3% WR, 65.7% Roll Success, $19.69 avg P&L

# =========================================================================
# TRAINING SUMMARY (2026-01-29)
# =========================================================================
# Trained on: 340 symbols with 750+ bars (4-5 years historical data)
# Database: 709,516 historical price bars
# VIX data: 1,382 days (2020-2026)
#
# Strategy Results (after optimization with rolls):
#
# PULLBACK:     80.9% Win Rate, 44.3% Roll Success, Sharpe 0.43
# BOUNCE:       87.3% Win Rate, 65.7% Roll Success, Sharpe 4.21
# ATH_BREAKOUT: 81.2% Win Rate, 62.2% Roll Success, Sharpe -0.36
# EARNINGS_DIP: 80.7% Win Rate, 58.3% Roll Success, Sharpe 0.76
#
# Key Findings:
# - BOUNCE strategy performs best with 87.3% WR and 4.21 Sharpe
# - Roll success rates between 44-66% across strategies
# - High VIX regimes (>20) show significantly better performance
# - LOW VIX environments (<15) underperform across all strategies
# =========================================================================

# =========================================================================
# SECTOR RELATIVE STRENGTH (Phase 2 — RRG Quadrants)
# =========================================================================
# Replaces SectorCycleService multiplicative factors with additive modifiers.
# Feature-flagged: set enabled=true + scanner.enable_sector_rs=true
sector_rs:
  enabled: true  # Activated in v5.0.0
  benchmark: "SPY"
  # Slow window (Kontext, B in dual-window model)
  # NOTE: ema_slow changed from 30→50; score_modifier still based on slow quadrant
  lookback_days: 120      # was 60; 100d slow EMA + buffer
  ema_slow: 50            # was 30; closer to true 100d-equivalent
  momentum_lookback: 14   # was 5; longer-term trend signal
  # Fast window (Signal, F in dual-window model) — NEW E.1
  fast_window: 20         # 20d lookback for fast slice
  fast_ema: 10            # EMA period for fast RS
  fast_momentum_lookback: 5
  fast_weight: 1.5        # composite = B + 1.5 * F (used in E.2 AlphaScorer)
  alpha_longlist_size: 30 # Top-N for Alpha-Longlist (E.2)
  alpha_engine_enabled: true  # E.3: Two-stage pipeline (Alpha pre-filter → Scanner)
  # Unchanged
  cache_ttl_hours: 8
  score_modifiers:         # Risk-filter modifier stays on slow quadrant
    leading: 0.5
    improving: 0.3
    weakening: -0.3
    lagging: -0.5

# =========================================================================
# BASISSTRATEGIE ÜBERSICHT
# =========================================================================
# Alle Profile verwenden dieselbe Basisstrategie (Bull-Put-Spread):
#
# SHORT PUT (verkauft):
# - Delta-Target:    -0.20 (±0.03)
# - Delta-Range:     [-0.23, -0.17]
#
# LONG PUT (gekauft):
# - Delta-Target:    -0.05 (±0.02)
# - Delta-Range:     [-0.07, -0.03]
#
# TIMING:
# - DTE:             60-90 Tage
# - Earnings-Buffer: 45 Tage (keine Optionen wenn Earnings < 45 Tage)
#
# =========================================================================
# DYNAMISCHE SPREAD-BREITE
# =========================================================================
# Spread-Breite wird basierend auf Aktienkurs berechnet:
#
# Aktienkurs   | Basis-Spread | Bei VIX 20-30 | Bei VIX >30
# -------------|--------------|---------------|-------------
# < $30        | $1.00        | $1.00         | $2.50
# $30-50       | $2.50        | $2.50         | $5.00
# $50-100      | $5.00        | $7.50         | $10.00
# $100-200     | $5.00        | $7.50         | $10.00
# $200-500     | $10.00       | $15.00        | $20.00
# > $500       | $15.00       | $20.00        | $25.00
#
# Funktion: calculate_spread_width(stock_price, regime) in vix_strategy.py

# =============================================================================
# E.2b ALPHA COMPOSITE (Multi-Faktor)
# =============================================================================

alpha_composite:
  # Feature-Flag: aktiviert TechnicalComposite statt RS-only Formel (E.2b.4)
  enabled: true

  # 4x4 Quadrant-Kombinations-Matrix (Classic × Fast)
  # Key-Format: "{CLASSIC}_{FAST}"
  quadrant_scores:
    LEADING_LEADING: 30
    LEADING_IMPROVING: 10
    LEADING_WEAKENING: -5
    LEADING_LAGGING: -10
    IMPROVING_LEADING: 25
    IMPROVING_IMPROVING: 10
    IMPROVING_WEAKENING: -10
    IMPROVING_LAGGING: -15
    WEAKENING_LEADING: 5
    WEAKENING_IMPROVING: 0
    WEAKENING_WEAKENING: -15
    WEAKENING_LAGGING: -20
    LAGGING_LEADING: 20
    LAGGING_IMPROVING: 15
    LAGGING_WEAKENING: -20
    LAGGING_LAGGING: -25

  # RSI Score-Mapping
  rsi_scoring:
    period: 14
    oversold_threshold: 30      # RSI < 30 → max bullish
    oversold_score: 5.0
    neutral_upper: 70           # RSI > 70 → overbought
    overbought_score: -3.0
    neutral_bullish_score: 3.0  # Score at RSI=70 (linear from 50)

  # Gewichte pro Komponente (E.2b.2-E.2b.4 füllen die TODO-Felder)
  weights:
    rsi: 1.0
    money_flow: 1.0       # E.2b.2
    tech: 1.0             # E.2b.3
    divergence: 1.0       # E.2b.2
    earnings: 1.0         # E.2b.3
    seasonality: 0.5      # E.2b.3
    quadrant_combo: 1.0

  # Christian's Divergenz-Penalty-Skala (für Composite, nicht Pullback-Analyzer)
  divergence_penalties:
    single: -6
    double: -12
    severe: -20

  # Money Flow Score Konfiguration
  money_flow_scoring:
    obv_weight: 0.40
    mfi_weight: 0.35
    cmf_weight: 0.25
    obv_sma_period: 20
    mfi_period: 14
    cmf_period: 20

  # Post-Crash-Modus: Gewichte wenn Stress-Score >= 4 (VIX >= 25 als Vereinfachung)
  # Fast-Fenster bekommt mehr Gewicht, Classic wird reduziert
  post_crash:
    classic_weight: 0.3       # statt 1.0
    fast_weight_adj: 0.7      # Faktor auf den fast_weight (0.7 * 1.5 = 1.05)
    score_adjustment: -8      # globaler Score-Abzug im Post-Crash-Modus

