# OptionPlay Trading Configuration (consolidated)
# Merged from: trading_rules.yaml + strategies.yaml

# --- From trading_rules.yaml ---

# Trading Rules Configuration
# ===========================
# Tunable constants from PLAYBOOK.md, externalized for Walk-Forward calibration.
# Changes here take effect on next server restart (no code deploy needed).
#
# NOTE: Delta targets are deliberately excluded — "Delta ist heilig" (PLAYBOOK §2).
# NOTE: Blacklist symbols stay in code (data, not thresholds).
# NOTE: Liquidity thresholds are in config/scoring_weights.yaml (already config-driven).

# =============================================================================
# ENTRY RULES (PLAYBOOK §1)
# =============================================================================
entry:
  stability_min: 65.0          # Minimum Stability Score (65-70 = WARNING)
  earnings_min_days: 45        # Minimum days to earnings
  earnings_quarterly_max_gap: 100  # Max days since last earnings for "recently reported"
  vix_max_new_trades: 30.0     # No new trades above this VIX
  vix_no_trading: 35.0         # No trading at all above this
  price_min: 20.0              # Minimum stock price
  price_max: 1500.0            # Maximum stock price
  volume_min: 500000           # Minimum daily volume
  iv_rank_min: 50.0            # IV Rank minimum (Tastytrade)
  iv_rank_max: 80.0            # IV Rank warning ceiling (soft filter)

# =============================================================================
# SPREAD PARAMETERS (PLAYBOOK §2)
# =============================================================================
# Delta targets excluded — hardcoded in trading_rules.py
spread:
  # DTE convention: same range used for both entry signal selection and options chain
  # query (IBKR/local DB). Hardcoded fallback in trading_rules.py is 60-90 but
  # these values (35-50) take precedence at runtime via SPREAD_DTE_MIN/MAX.
  dte_min: 35                  # Entry signal + chain query lower bound (Tastytrade)
  dte_max: 50                  # Entry signal + chain query upper bound (Tastytrade)
  dte_target: 45               # Optimal DTE target (Tastytrade)
  min_credit_pct: 10.0         # Min credit as % of spread width
  min_credit_absolute: 20.0    # Min absolute credit per contract (USD)
  fee_warning_threshold: 40.0  # Warn when credit < this (fee erosion)
  ibkr_round_trip_fee: 2.60    # IBKR fee per spread round-trip (USD)

# =============================================================================
# VIX REGIME RULES (PLAYBOOK §3)
# =============================================================================
vix_regimes:
  boundaries:
    low_vol_max: 15.0
    normal_max: 20.0
    danger_zone_max: 25.0
    elevated_max: 30.0
    no_trading: 35.0

  rules:
    low_vol:
      stability_min: 65.0
      new_trades_allowed: true
      max_positions: 10
      max_per_sector: 2
      risk_per_trade_pct: 2.5  # 2.5% in low/normal VIX (Friend-Style); reduziert in higher VIX-Regimes
      profit_exit_pct: 50.0
    normal:
      stability_min: 65.0
      new_trades_allowed: true
      max_positions: 10
      max_per_sector: 2
      risk_per_trade_pct: 2.5  # 2.5% in low/normal VIX (Friend-Style); reduziert in higher VIX-Regimes
      profit_exit_pct: 50.0
    danger_zone:
      stability_min: 80.0
      new_trades_allowed: true
      max_positions: 5
      max_per_sector: 1
      risk_per_trade_pct: 1.5
      profit_exit_pct: 30.0
    elevated:
      stability_min: 80.0
      new_trades_allowed: true
      max_positions: 3
      max_per_sector: 1
      risk_per_trade_pct: 1.0
      profit_exit_pct: 30.0
    high_vol:
      stability_min: 100.0
      new_trades_allowed: false
      max_positions: 0
      max_per_sector: 0
      risk_per_trade_pct: 0.0
      profit_exit_pct: 0.0
    no_trading:
      stability_min: 100.0
      new_trades_allowed: false
      max_positions: 0
      max_per_sector: 0
      risk_per_trade_pct: 0.0
      profit_exit_pct: 0.0

# =============================================================================
# EXIT RULES (PLAYBOOK §4)
# =============================================================================
exit:
  profit_pct_normal: 50.0      # Close at 50% profit (VIX < 20)
  profit_pct_high_vix: 30.0    # Close at 30% profit (VIX >= 20)
  stop_loss_multiplier: 2.0    # 200% of credit = stop loss
  roll_dte: 21                 # Decision point: roll or close
  force_close_dte: 7           # Force close, no exceptions

# =============================================================================
# ROLL RULES (PLAYBOOK §4)
# =============================================================================
roll:
  allowed_max_loss_pct: 0.0    # Max: break-even (0% loss)
  new_dte_min: 35              # New expiration: 35-50 DTE (Tastytrade)
  new_dte_max: 50
  min_credit_pct: 10.0         # New credit must be >= 10% spread
  trigger_dte: 21              # Roll at 21 DTE
  roll_if_profit_below_pct: 50 # Roll if profit < 50%
  keep_strike: true            # Keep same strike on roll
  trigger_pct: -50.0           # Roll at -50% loss

# =============================================================================
# POSITION SIZING (PLAYBOOK §5)
# =============================================================================
sizing:
  max_risk_per_trade_pct: 2.5  # 2.5% in low/normal VIX (Friend-Style); reduziert in higher VIX-Regimes
  max_open_positions: 10       # Max open positions (VIX < 20)
  max_per_sector: 2            # Max positions per sector
  max_new_trades_per_day: 2    # Max new trades per day
  max_buying_power_pct: 5.0    # Max 5% buying power per trade (Tastytrade)
  max_portfolio_allocation: 50.0  # Max 50% portfolio in spreads
  max_margin_pct: 50.0         # Max 50% margin utilization (IBKR live or notional estimate)
  use_ibkr_margin: true        # Try IBKR account summary first; fallback to notional

# =============================================================================
# DISCIPLINE RULES (PLAYBOOK §6)
# =============================================================================
discipline:
  max_trades_per_month: 25
  max_trades_per_day: 2
  max_trades_per_week: 8
  consecutive_losses_pause: 3  # Pause after N consecutive losses
  pause_days: 7                # Duration of pause in days
  monthly_losses_pause: 5      # Pause after N losses in a month
  monthly_drawdown_pause: 5.0  # Pause after N% portfolio drawdown

# =============================================================================
# BLACKLIST CRITERIA
# =============================================================================
blacklist_criteria:
  stability_threshold: 40.0    # Below this = blacklist
  win_rate_threshold: 70.0     # Below this = blacklist
  volatility_threshold: 100.0  # Above this (annualized %) = blacklist

# =============================================================================
# WATCHLIST
# =============================================================================
watchlist:
  secondary_stability_min: 70.0  # Secondary watchlist minimum stability

# =============================================================================
# RISK MANAGEMENT (from risk_management.py)
# =============================================================================
risk_management:
  otm_target_pct: 10.0          # Short strike 10% below price
  risk_reward_min: 0.25          # Minimum 25% Return on Risk
  risk_reward_target: 0.35       # Target 35% RoR
  risk_reward_optimal: 0.40      # Optimal 40% RoR
  max_position_size_pct: 5.0     # Max 5% per position
  max_sector_exposure_pct: 20.0  # Max 20% per sector
  max_total_risk_pct: 10.0       # Max 10% total risk
  kelly_fraction: 0.25           # Use 25% of Kelly optimum
  kelly_max_bet_pct: 5.0         # Maximum bet even with high Kelly
  win_rate_base_multiplier: 0.7  # Base multiplier
  win_rate_divisor: 300.0        # Divisor for win rate integration
  stop_loss_pct_of_width: 150.0  # Stop at 150% of spread width risk
  stop_loss_vix_low_mult: 1.0    # VIX < 15: Normal
  stop_loss_vix_normal_mult: 1.2 # VIX 15-25: 20% wider
  stop_loss_vix_high_mult: 1.5   # VIX > 25: 50% wider
  earnings_safe_days: 90         # Classified as "safe"
  earnings_post_buffer_days: 2   # Days after earnings before new trade
  max_positions_per_symbol: 2    # Max positions per symbol

# =============================================================================
# IV ANALYSIS THRESHOLDS (from iv_analyzer.py)
# =============================================================================
iv_analysis:
  rank_very_high: 70             # IV Rank >= this = "very high"
  rank_elevated: 50              # IV Rank >= this = "elevated"
  rank_normal: 30                # IV Rank >= this = "normal"

# =============================================================================
# DISPLAY THRESHOLDS (from pick_formatter.py)
# =============================================================================
display:
  rsi_oversold: 35               # RSI < this = "(oversold)" label
  rsi_overbought: 65             # RSI > this = "(overbought)" label

# =============================================================================
# SPREAD ANALYSIS (from spread_analyzer.py)
# =============================================================================
spread_analysis:
  # Risk level classification (credit as % of spread width)
  low_risk_max_credit_pct: 20
  moderate_risk_max_credit_pct: 30
  high_risk_max_credit_pct: 40
  # Warning thresholds
  min_buffer_pct: 5.0            # Warning if buffer < 5%
  max_dte_for_theta: 60          # Theta most effective under 60 DTE
  # Profit target recommendations
  profit_target_standard: 50     # Tastytrade: exit at 50% of max profit
  profit_target_aggressive: 50   # Tastytrade: exit at 50% of max profit
  # Risk scoring (inline values from _assess_risk_level)
  risk_scoring:
    buffer_warning_pct: 5        # Buffer < this → +2 score
    buffer_caution_pct: 10       # Buffer < this → +1 score
    dte_high_gamma: 14           # DTE < this → +1 score
    dte_caution: 30              # DTE < this → +0.5 score
    level_low_max: 2             # Score ≤ this = LOW risk
    level_moderate_max: 4        # Score ≤ this = MODERATE
    level_high_max: 6            # Score ≤ this = HIGH (above = VERY_HIGH)
  # P&L scenario price multipliers
  scenario_multipliers:
    up_pct: 1.05                 # +5% scenario
    down_pct: 0.95               # -5% scenario
    crash_pct: 0.85              # -15% scenario

# =============================================================================
# VIX TREND ANALYSIS (from vix_strategy.py)
# =============================================================================
vix_trend:
  z_score_thresholds:
    rising_fast: 1.5             # Z-Score > this = RISING_FAST
    rising: 0.75                 # Z-Score > this = RISING
    falling: -0.75               # Z-Score < this = FALLING
    falling_fast: -1.5           # Z-Score < this = FALLING_FAST
  stdev_minimum: 0.5             # Floor for VIX StdDev in Z-score calc
  current_threshold: 2.0         # VIX points: skip trend if not "current"
  nearness_margin: 1.0           # VIX points buffer for threshold nearness

# --- From strategies.yaml ---

# OptionPlay - Strategy Profiles
# ==============================
# Basisstrategie: Bull-Put-Spread
#   Short Put: Delta -0.20 ±0.03 (Range: 0.17-0.23)
#   Long Put:  Delta -0.05 ±0.02 (Range: 0.03-0.07)
#   DTE: 60-90 Tage
#   Earnings-Buffer: mindestens 45 Tage

# =========================================================================
# SPREAD DEFAULTS (für alle Strategien)
# =========================================================================
spread_defaults:
  short_put:
    delta_target: -0.20
    delta_minimum: -0.17           # PLAYBOOK: ±0.03
    delta_maximum: -0.23
  long_put:
    delta_target: -0.05
    delta_minimum: -0.03           # PLAYBOOK: ±0.02
    delta_maximum: -0.07

profiles:
  # =========================================================================
  # KONSERVATIV - Für ruhige Märkte (VIX < 15)
  # =========================================================================
  conservative:
    name: "Konservativ"
    description: "Niedriges Risiko bei niedrigen Prämien. Für VIX < 15."

    pullback_scoring:
      min_score_for_candidate: 6

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 20
        iv_rank_maximum: 80

    options_analysis:
      expiration:
        dte_minimum: 35               # Tastytrade: 35-50 Tage
        dte_maximum: 50
      short_put:
        delta_minimum: -0.13
        delta_maximum: -0.19
        delta_target: -0.16           # Tastytrade: konservativ bei niedrigem VIX
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 5.0
      premium:
        minimum_credit_percent: 25

    market_conditions:
      vix_range: [0, 15]

  # =========================================================================
  # STANDARD - Ausgeglichenes Profil (VIX 15-20)
  # =========================================================================
  standard:
    name: "Standard"
    description: "Ausgeglichenes Risiko-Rendite-Profil. Für VIX 15-20."

    pullback_scoring:
      min_score_for_candidate: 5

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 25
        iv_rank_maximum: 80

    options_analysis:
      expiration:
        dte_minimum: 35               # Tastytrade: 35-50 Tage
        dte_maximum: 50
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 5.0
      premium:
        minimum_credit_percent: 25

    market_conditions:
      vix_range: [15, 20]

  # =========================================================================
  # AGGRESSIV - Für erhöhte Volatilität (VIX 20-30)
  # =========================================================================
  aggressive:
    name: "Moderat Aggressiv"
    description: "Bessere Prämien, erhöhte Vorsicht. Für VIX 20-30."

    pullback_scoring:
      min_score_for_candidate: 5

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      implied_volatility:
        iv_rank_minimum: 30
        iv_rank_maximum: 80

    options_analysis:
      expiration:
        dte_minimum: 35               # Tastytrade: 35-50 Tage
        dte_maximum: 50
      short_put:
        delta_minimum: -0.17
        delta_maximum: -0.23
        delta_target: -0.20           # PLAYBOOK: ±0.03
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 7.5          # Breiterer Spread für Gap-Schutz
      premium:
        minimum_credit_percent: 30

    market_conditions:
      vix_range: [20, 30]

    warnings:
      - "Positionsgrößen reduzieren"
      - "Breitere Spreads nutzen"

  # =========================================================================
  # HIGH_VOL - Für extreme Volatilität / Crash-Modus (VIX > 30)
  # =========================================================================
  high_volatility:
    name: "High Volatility (Crash-Modus)"
    description: "Hohe Prämien, maximale Vorsicht. Für VIX > 30."

    pullback_scoring:
      min_score_for_candidate: 6      # Höhere Qualität

    filters:
      earnings:
        exclude_days_before: 30       # PLAYBOOK: ENTRY_EARNINGS_MIN_DAYS (was 45)
      price:
        minimum: 50
        maximum: 1500
      implied_volatility:
        iv_rank_minimum: 40
        iv_rank_maximum: 95

    options_analysis:
      expiration:
        dte_minimum: 35               # Tastytrade: 35-50 Tage
        dte_maximum: 50
      short_put:
        delta_minimum: -0.13
        delta_maximum: -0.19
        delta_target: -0.16           # Tastytrade: konservativ bei hohem VIX
      long_put:
        delta_minimum: -0.03
        delta_maximum: -0.07
        delta_target: -0.05           # PLAYBOOK: ±0.02
      spread:
        preferred_width: 10.0         # Breiterer Spread für Schutz
      premium:
        minimum_credit_percent: 30

    market_conditions:
      vix_range: [30, 100]

    warnings:
      - "Positionsgrößen auf 50% reduzieren"
      - "Tägliche Portfolio-Überwachung erforderlich"

# =========================================================================
# AUTO-PROFIL LOGIK
# =========================================================================
auto_selection:
  enabled: true
  vix_source: "yahoo"
  fallback_profile: "standard"

  vix_mapping:
    - vix_max: 15
      profile: "conservative"
    - vix_max: 20
      profile: "standard"
    - vix_max: 30
      profile: "aggressive"
    - vix_max: 100
      profile: "high_volatility"

# =========================================================================
# EXIT STRATEGY (from Backtest 2026-01-28)
# =========================================================================
# Backtest Results over 621 out-of-sample trades across 343 symbols:
#
# BEST BY SHARPE RATIO (recommended):
#   profit_target: 100%  (hold for max profit)
#   stop_loss: 150%      (wide stop, rarely triggers)
#   dte_exit: 7          (gamma risk management)
#   Win Rate: 75.4%, Avg P&L: 7.15%, Sharpe: 0.127
#
# ALTERNATIVE - Higher Win Rate:
#   profit_target: 50%   (take profits early)
#   stop_loss: 150%
#   dte_exit: 7
#   Win Rate: 85.0%, Avg P&L: 3.54%, Sharpe: 0.085
#
# KEY INSIGHT: Stop-Loss at 100% triggers too often and hurts returns.
#              Wide stop (150%+) lets winning trades recover from drawdowns.
# =========================================================================
exit_strategy:
  # Default: Tastytrade 50% profit target, 2× premium stop
  default:
    profit_target_pct: 50     # Tastytrade: exit at 50% profit
    stop_loss_pct: 200        # 2× premium stop loss
    dte_exit: 7               # Close at 7 DTE (gamma risk)

  # Conservative: Same targets, earlier DTE exit
  conservative:
    profit_target_pct: 50
    stop_loss_pct: 200
    dte_exit: 14

  # Aggressive: Same targets
  aggressive:
    profit_target_pct: 50     # Tastytrade: exit at 50% profit
    stop_loss_pct: 200        # 2× premium stop loss
    dte_exit: 7

