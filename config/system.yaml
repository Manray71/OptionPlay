# OptionPlay System Configuration (consolidated)
# Merged from: settings.yaml + scanner_config.yaml + liquidity_blacklist

# ===========================================================================
# SETTINGS (from settings.yaml)
# ===========================================================================

# OptionPlay - Haupt-Konfiguration
# ==================================
# Alle Parameter können hier angepasst werden ohne Code-Änderungen.
# Dokumentation: docs/ARCHITECTURE.md

# ============================================================================
# DATENQUELLEN-PRIORITÄT
# ============================================================================
# Für historische Preisdaten (Scanner, Analysen) wird folgende Priorität verwendet:
# 1. Lokale SQLite-Datenbank (~/.optionplay/trades.db) - Schnellste Option
# 2. API-Provider (Tradier) - Fallback für fehlende/aktuelle Daten
#
# Die lokale DB enthält 356 Symbole mit Daten von 2021-01-04 bis heute.
# Daten werden aus der options_prices Tabelle (underlying_price) extrahiert.

data_sources:
  # Lokale Datenbank für historische Daten
  local_database:
    enabled: true                     # Lokale DB als primäre Quelle nutzen
    db_path: "~/.optionplay/trades.db"
    # Fallback auf API wenn Daten älter als X Tage
    max_data_age_days: 7              # Nutze API wenn letzte Daten > 7 Tage alt
    # Minimum benötigte Datenpunkte
    min_data_points: 60               # Mindestens 60 Tage für technische Analyse

  # Provider-Priorität für API-Calls (wenn lokale DB nicht ausreicht)
  # Reihenfolge: Erste verfügbare Quelle wird genutzt
  provider_priority:
    - "local_db"                      # 1. Lokale Datenbank (schnellste)
    - "tradier"                       # 2. Tradier API
    - "marketdata"                    # 3. Marketdata.app
    - "yahoo"                         # 4. Yahoo Finance (Fallback)

# ============================================================================
# VERBINDUNGS-EINSTELLUNGEN
# ============================================================================
connection:
  ibkr:
    host: "127.0.0.1"
    port: 4001                    # 4001 = Gateway Live, 4002 = Gateway Paper, 7497 = TWS Paper
    client_id: 1
    timeout_seconds: 30
    max_retries: 3
    retry_delay_seconds: 5

  # Tradier API - Alternative/Ergänzung
  # Tradier bietet kostenloses Basis-Abo mit delayed Quotes und
  # Premium-Optionen mit Real-time Daten und ORATS Greeks.
  #
  # Vorteile:
  # - Bessere Greeks aus ORATS-Daten
  # - Höhere Rate Limits (120/min vs 100/min)
  # - Brokerage-Integration möglich
  #
  # Setup:
  # 1. Konto erstellen: https://tradier.com
  # 2. API Key holen: Settings > API Access
  # 3. Environment Variable setzen: export TRADIER_API_KEY="your_key"
  #
  tradier:
    enabled: true
    environment: "production"     # "sandbox" oder "production"
    base_url_sandbox: "https://sandbox.tradier.com"
    base_url_production: "https://api.tradier.com"
    api_key: ""                   # Via Environment Variable: TRADIER_API_KEY
    timeout_seconds: 30
    max_retries: 3
    retry_delay_seconds: 1.0
    rate_limit_per_minute: 120    # Tradier Standard-Limit
    # Greeks und IV kommen von ORATS (in Options-Chain enthalten)
    # Historische IV ist NICHT verfügbar - verwende HV-Schätzung
    #
    # Provider-Priorität (automatisches Routing):
    # 1. IBKR/TWS (wenn verbunden) - Live-Daten
    # 2. Tradier (wenn API Key gesetzt) - Premium-Daten
    # 3. Yahoo Finance - Kostenloser Fallback für VIX/Earnings

  # Fallback-Quellen
  yahoo_finance:
    enabled: true                 # Für Earnings & Basis-Daten

# ============================================================================
# PULLBACK-SCORING PARAMETER
# ============================================================================
# Diese Parameter definieren, wie der Pullback-Score (0-10) berechnet wird.
# Jede Komponente hat eigene Schwellenwerte und Gewichtungen.

pullback_scoring:
  # RSI-basiertes Scoring (max 3 Punkte)
  rsi:
    period: 14                    # RSI Berechnungsperiode
    thresholds:
      extreme_oversold: 30        # RSI < 30 = 3 Punkte
      oversold: 40                # RSI < 40 = 2 Punkte
      neutral: 50                 # RSI < 50 = 1 Punkt
    weights:
      extreme_oversold: 3
      oversold: 2
      neutral: 1

  # Support-Nähe Scoring (max 2 Punkte)
  support:
    lookback_days: 120             # Tage für Support-Erkennung
    proximity_percent: 3.0        # Preis innerhalb X% von Support = 2 Punkte
    proximity_percent_wide: 5.0   # Preis innerhalb X% von Support = 1 Punkt
    min_touches: 2                # Min. Berührungen für validen Support
    weights:
      close_to_support: 2
      near_support: 1

  # Fibonacci Retracement Scoring (max 2 Punkte)
  fibonacci:
    lookback_days: 90             # Tage für High/Low Berechnung
    levels:                       # Fibonacci-Level mit Toleranz
      - level: 0.618              # 61.8% = Goldener Schnitt
        tolerance: 0.02           # ±2% Toleranz
        points: 2
      - level: 0.500              # 50%
        tolerance: 0.02
        points: 2
      - level: 0.382              # 38.2%
        tolerance: 0.02
        points: 1

  # Moving Average Trend Scoring (max 2 Punkte)
  moving_averages:
    short_period: 20              # Kurzfristiger MA
    long_period: 200              # Langfristiger MA (Trendfilter)
    scoring_rules:
      # Dip im Aufwärtstrend: Preis > 200 SMA aber < 20 SMA
      dip_in_uptrend:
        condition: "price > sma_200 AND price < sma_20"
        points: 2
      # Über beiden MAs = starker Trend aber kein Pullback
      above_both:
        condition: "price > sma_200 AND price > sma_20"
        points: 0
      # Unter 200 SMA = kein Aufwärtstrend
      below_long_ma:
        condition: "price < sma_200"
        points: 0

  # Volumen-Anomalie Scoring (max 1 Punkt)
  volume:
    average_period: 20            # Tage für Durchschnittsvolumen
    spike_multiplier: 1.5         # Volumen > 1.5x Durchschnitt = 1 Punkt
    weights:
      volume_spike: 1

  # Gesamt-Score Einstellungen
  total:
    max_score: 10
    min_score_for_candidate: 5    # Mindest-Score für Weiterverarbeitung

# ============================================================================
# FILTER-EINSTELLUNGEN (STUFE 2)
# ============================================================================
filters:
  # Earnings-Filter (KRITISCH für Bull-Put-Spreads!)
  earnings:
    exclude_days_before: 45       # Keine Aktien mit Earnings in X Tagen (PLAYBOOK §1: >45 Tage)
    data_source: "yfinance"       # Datenquelle für Earnings-Dates

  # Preis-Filter
  price:
    minimum: 20.0                 # Mindestpreis (keine Penny Stocks)
    maximum: 1500.0               # Maximalpreis (PLAYBOOK §1)

  # Volumen-Filter
  volume:
    minimum_daily: 500000         # Mindest-Tagesvolumen
    minimum_avg_20d: 300000       # Mindest-20-Tage-Durchschnitt

  # IV-Filter
  implied_volatility:
    iv_rank_minimum: 30           # Mindest IV-Rank (%)
    iv_rank_maximum: 80           # Maximum (zu hohe IV = erhöhtes Risiko)
    iv_percentile_minimum: 25     # Alternative: IV-Perzentil

  # Sektor-Filter (optional)
  sectors:
    exclude: []                   # z.B. ["Utilities", "Real Estate"]
    include_only: []              # Leer = alle Sektoren

  # ==========================================================================
  # FUNDAMENTALS-FILTER (NEU - basierend auf Training-Erkenntnissen)
  # ==========================================================================
  # Nutzt Daten aus symbol_fundamentals Tabelle für intelligente Filterung
  # Erkenntnisse aus 17.438 Backtest-Trades:
  # - Stability Score ≥70 → 94.5% Win Rate (vs. 66% bei <50)
  # - Extreme-Vol Symbole (>70% HV) nur 27-31% Win Rate
  fundamentals:
    enabled: true                 # Fundamentals-Filter aktivieren

    # Stability Filter (aus historischen Backtest-Ergebnissen)
    # Stability Score = 100 - (avg_drawdown * 3 + avg_days_below_short * 2)
    min_stability_score: 50.0     # Scanner Pre-Filter: ≥50 (Stability-First Tier-System handhabt Rest: ≥80→4.0, ≥70→5.0, ≥50→6.0 min_score)
    warn_below_stability: 60.0    # Warnung im Signal wenn unter diesem Wert
    boost_above_stability: 70.0   # Score-Boost für sehr stabile Symbole

    # Historical Win Rate aus Backtests
    min_historical_win_rate: 65.0 # Gesenkt von 70: Tier-System filtert nach Score-Qualität

    # Volatilitäts-Filter
    max_historical_volatility: 70.0  # Max. annualisierte HV (%), 70% = Grenzwert
    max_beta: 2.0                 # Max. Beta zu SPY (volatiler als Markt)

    # IV Rank Filter (ergänzt bestehenden Filter)
    iv_rank_min: 20.0             # Min IV Rank für ausreichend Prämie
    iv_rank_max: 80.0             # Max IV Rank (zu hoch = Risiko)
    use_iv_percentile: false      # true = iv_percentile_252d statt iv_rank_252d

    # SPY Correlation (für Portfolio-Diversifikation)
    # Niedrige Korrelation = unabhängig vom Markt
    max_spy_correlation: null     # z.B. 0.7 für Diversifikation
    min_spy_correlation: null     # z.B. 0.3 um "Meme Stocks" auszuschließen

    # Sektor-Filter
    exclude_sectors: []           # z.B. ["Utilities", "Real Estate"]
    include_sectors: []           # Leer = alle Sektoren erlaubt

    # Market Cap Filter
    # Kategorien: "Micro", "Small", "Mid", "Large", "Mega"
    exclude_market_caps: ["Micro"]  # Micro Caps ausschließen
    include_market_caps: []       # Leer = alle erlaubt (außer excluded)

    # Symbol Blacklist (NIEMALS handeln)
    # Basierend auf Training: <50 Stability, <70% Win Rate
    blacklist_symbols:
      - ROKU    # Stability 24, WR 61%
      - SNAP    # Stability 13, WR 64%
      - UPST    # Stability 15, WR 60%
      - AFRM    # Stability 18, WR 66%
      - MRNA    # Stability 30, WR 64%
      - RUN     # Stability 0, WR 40%
      - MSTR    # Stability 37, WR 58%
      - TSLA    # Stability 41, WR 78% (Meme-Stock-Dynamik)
      - COIN    # Stability 33, WR 73% (Crypto-Korrelation)
      - SQ      # Stability 36, WR 68%
      # Extreme-Vol (>100% annualisierte Volatilität)
      - DAVE
      - IONQ
      - QBTS
      - QMCO
      - QUBT
      - RDW
      - RGTI

    # Symbol Whitelist (überschreibt ALLE anderen Filter)
    whitelist_symbols: []         # z.B. ["SPY", "QQQ"] für ETF-only

# ============================================================================
# OPTIONS-ANALYSE PARAMETER (STUFE 3)
# ============================================================================
options_analysis:
  # Ablauf-Präferenzen
  expiration:
    dte_minimum: 60               # Mindest-Tage bis Verfall
    dte_maximum: 90               # Maximum-Tage bis Verfall
    dte_target: 75                # Ideale DTE für Bull-Put-Spreads
    prefer_monthly: true          # Monatliche Optionen bevorzugen

  # Strike-Auswahl für Short Put (PLAYBOOK §2: ±0.03)
  short_put:
    delta_minimum: -0.17          # Nicht aggressiver als -0.17 Delta (PLAYBOOK §2)
    delta_maximum: -0.23          # Nicht konservativer als -0.23 Delta (PLAYBOOK §2)
    delta_target: -0.20           # Ziel-Delta
    prefer_below_support: true    # Strike unter Support-Level bevorzugen

  # Strike-Auswahl für Long Put (PLAYBOOK §2: ±0.02)
  long_put:
    delta_minimum: -0.03          # Nicht aggressiver als -0.03 Delta (PLAYBOOK §2)
    delta_maximum: -0.07          # Nicht konservativer als -0.07 Delta (PLAYBOOK §2)
    delta_target: -0.05           # Ziel-Delta

  # Spread-Breite: NICHT konfigurierbar!
  # Ergibt sich dynamisch aus Delta-Differenz (Short -0.20, Long -0.05)
  # Siehe PLAYBOOK §2: "Delta ist heilig"

  # Premium-Anforderungen
  premium:
    minimum_credit: 1.00          # Mindest-Prämie ($) - kein Trade unter 1€
    minimum_credit_percent: 10    # Mindest-Prämie als % der Spread-Breite (PLAYBOOK §2)
    target_credit_percent: 33     # Ziel: 1/3 der Spread-Breite

  # Liquiditäts-Anforderungen
  liquidity:
    min_open_interest: 100        # Mindest OI pro Strike (< 100 = sehr niedrig)
    max_bid_ask_spread: 0.20      # Max. Bid-Ask-Spread ($)
    max_bid_ask_percent: 10       # Max. Bid-Ask als % des Optionspreises

# ============================================================================
# IV-RANK BERECHNUNG
# ============================================================================
iv_calculation:
  lookback_days: 252              # Trading-Tage für 52-Wochen-Range
  data_source: "tradier"          # Primäre Quelle
  fallback_source: "calculated"   # Aus historischer Volatilität berechnen

  # Historische Volatilität als Fallback
  historical_volatility:
    periods: [20, 60, 252]        # HV-Perioden zur Berechnung
    annualization_factor: 252     # Trading-Tage pro Jahr

# ============================================================================
# MAX-PAIN BERECHNUNG
# ============================================================================
max_pain:
  use_weekly_expiry: false        # Wöchentliche Optionen einbeziehen
  min_open_interest: 50           # Mindest OI für Berücksichtigung
  wall_detection:
    significant_oi_multiplier: 2.0  # OI > 2x Durchschnitt = Wall

# ============================================================================
# WATCHLIST-MANAGEMENT
# ============================================================================
watchlist:
  source_file: "config/watchlists.yaml"
  # Verfügbare Watchlists:
  #   - default_275:    340 Symbole (ursprüngliche Watchlist)
  #   - sp500_complete: 502 Symbole (vollständiger S&P 500)
  #   - extended_600:   589 Symbole (S&P 500 + Growth/Momentum)
  #   - stable_list:    Automatisch generiert aus Symbolen mit Stability >= 60
  #   - risk_list:      Automatisch generiert aus Symbolen mit Stability < 60
  default_list: "extended_600"
  max_symbols_per_scan: 50        # Batch-Größe erhöht (war 25)

  # ==========================================================================
  # STABILITY-BASIERTE WATCHLIST-AUFTEILUNG
  # ==========================================================================
  # Teilt die Watchlist automatisch in "stable" und "risk" Listen auf.
  # Basierend auf dem Stability Score aus symbol_fundamentals.
  #
  # Vorteile:
  # - Schnellere Scans durch kleinere Listen
  # - Fokus auf qualitativ hochwertige Signale
  # - Separate Behandlung von riskanteren Symbolen
  #
  # Usage:
  #   /scan           → Scannt nur stable_list (schnell, hohe Qualität)
  #   /scan --risk    → Scannt nur risk_list (für Spekulation)
  #   /scan --all     → Scannt beide Listen
  stability_split:
    enabled: true                   # Aktiviert automatische Aufteilung
    stable_min_score: 60.0          # Minimum Stability Score für stable_list
    # Symbole mit Score >= 60 → stable_list (ca. 250 Symbole)
    # Symbole mit Score < 60 → risk_list (ca. 100 Symbole)
    # Symbole auf Blacklist → werden komplett ausgeschlossen
    # HINWEIS: Da nicht alle Symbole Stability Scores haben (nur ~8 bisher),
    # werden unbekannte Symbole der stable_list zugeordnet (außer Blacklist).
    include_unknown_in_risk: false  # Symbole ohne Score → stable_list

# ============================================================================
# LOGGING & DEBUGGING
# ============================================================================
logging:
  level: "INFO"                   # DEBUG, INFO, WARNING, ERROR
  include_timestamps: true
  log_api_calls: true             # Jeden API-Call loggen
  log_scores_breakdown: true      # Score-Komponenten im Output
  output_format: "json"           # json oder text

# ============================================================================
# PERFORMANCE & TIMEOUTS
# ============================================================================
performance:
  request_timeout: 30             # Sekunden pro API-Request
  batch_delay: 1.0                # Sekunden zwischen Batches
  max_concurrent_requests: 20     # Parallele Requests (erhöht für LocalDB)

  # Cache TTLs (längere TTL = weniger API-Calls!)
  # Historische Daten (Schlusskurse) ändern sich nur einmal täglich
  cache_ttl_seconds: 900          # 15 Minuten für historische Daten
  cache_ttl_intraday: 300         # 5 Minuten für Live-Quotes
  cache_ttl_vix: 300              # 5 Minuten für VIX

  historical_days: 260            # Standard-Tage für historische Daten (1 Jahr)
  cache_max_entries: 500          # Max Einträge im Historical Cache

# ============================================================================
# VERBINDUNGS-PARAMETER
# ============================================================================
api_connection:
  max_retries: 3                  # Max Verbindungsversuche
  retry_base_delay: 2             # Basis-Delay für exponentielles Backoff (Sekunden)
  vix_cache_seconds: 300          # VIX-Cache Dauer (5 Minuten)
  yahoo_timeout: 10               # Timeout für Yahoo Finance Requests

# ============================================================================
# CIRCUIT BREAKER PATTERN
# ============================================================================
circuit_breaker:
  failure_threshold: 5            # Fehler bis Circuit öffnet
  recovery_timeout: 60            # Sekunden bis Half-Open
  half_open_max_calls: 3          # Max Calls im Half-Open State
  success_threshold: 2            # Erfolge für Close im Half-Open

# ============================================================================
# SCANNER KONFIGURATION
# ============================================================================
scanner:
  # Automatischer Earnings Pre-Filter (reduziert API-Calls!)
  # Filtert Symbole VOR dem Scan heraus, deren Earnings zu nah sind.
  # Nutzt 4-Wochen-Cache für Earnings-Daten.
  # AKTIVIERT: KRITISCH für Trade-Sicherheit - Earnings am selben Tag sind gefährlich!
  auto_earnings_prefilter: true   # MUSS aktiv sein für sichere Empfehlungen
  earnings_prefilter_min_days: 45 # Mindestabstand zu Earnings (PLAYBOOK §1: >45 Tage)

  # BMO/AMC Handling: Earnings können vor Markt (BMO) oder nach Markt (AMC) sein
  # - AMC am Tag X: Reaktion erst am Tag X+1 → Tag X ist NICHT sicher
  # - BMO am Tag X: Reaktion bereits eingepreist → Tag X KANN sicher sein (optional)
  earnings_allow_bmo_same_day: false  # BMO am Earnings-Tag erlauben? (konservativ: false)

  # IV-Filter
  enable_iv_filter: true          # IV-Rank Filter aktivieren

  # Output-Limits
  max_results_per_symbol: 3       # Max Ergebnisse pro Symbol
  max_total_results: 50           # Max Gesamtergebnisse

  # Data Requirements
  min_data_points: 60             # Mindest-Datenpunkte für Analyse

  # Strategien aktivieren/deaktivieren
  enable_pullback: true
  enable_bounce: true

  # =========================================================================
  # STABILITY-FIRST-FILTER (Phase 6 - Symbol-Stability als primärer Filter)
  # =========================================================================
  # Stability ist der stärkste Prädiktor für Win Rate!
  # Training-Ergebnisse:
  # Simplified 2-tier stability filter:
  # - Qualified (≥60): min_score 3.5
  # - Blacklist (<60): rejected
  enable_stability_first: true
  stability_qualified_threshold: 60.0
  stability_qualified_min_score: 3.5

# ============================================================================
# RISIKO-MANAGEMENT PARAMETER
# ============================================================================
risk_management:
  # Position Sizing (informativ, nicht enforced)
  max_position_size_percent: 5    # Max. 5% des Portfolios pro Trade
  max_sector_exposure_percent: 20 # Max. 20% in einem Sektor

  # Trade-Qualität
  min_reward_risk_ratio: 0.25     # Mindest Return-on-Risk (25%)
  max_loss_per_spread: 500        # Max. Verlust pro Spread ($)

# ============================================================================
# ROLL-STRATEGIE PARAMETER (ML-Trainiert 2026-01-30)
# ============================================================================
# Optimierte Parameter aus 4,471 historischen Trades
# Gesamtstatistik: 87.2% Win Rate, 68.5% Roll Success Rate
# Roll-Strategie-Parameter: siehe config/trading.yaml


# ============================================================================
# SHADOW TRADE TRACKER
# ============================================================================
# Protokolliert daily_picks-Empfehlungen und trackt deren Ausgang.
# Separate DB: data/shadow_trades.db (WAL-Modus)
shadow_tracker:
  enabled: true
  auto_log_daily_picks: true
  auto_log_scans: false
  auto_log_min_score: 5.0
  db_path: "data/shadow_trades.db"

# ============================================================================
# TRADABILITY GATE
# ============================================================================
# Schwellenwerte für den Tradability-Check gegen die echte Options-Chain.
# Nur Trades, die alle Prüfungen bestehen, werden als Shadow Trade geloggt.
tradability_gate:
  min_net_credit: 2.00            # USD, berechnet als Short Bid - Long Ask
  min_open_interest: 100          # Pro Leg
  min_bid: 0.10                   # Short Put Bid muss > $0.10 sein
  max_bid_ask_spread_pct: 30      # Prozent des Midpoint

# ===========================================================================
# SCANNER CONFIG (from scanner_config.yaml)
# ===========================================================================

# Scanner Configuration
# Centralizes scanner parameters that were previously hardcoded.
# Changes here take effect on next server restart (no code deploy needed).

scanner_config:
  # Earnings Buffer (days before earnings to exclude symbol)
  # Modes allow quick switching between risk profiles.
  earnings_buffer:
    conservative: 45
    standard: 30
    aggressive: 20
    current_mode: "standard"  # Active mode (was 45d hardcoded)

  # Support Bounce Requirements
  support_bounce:
    min_touches: 2          # was 3 — relaxed to find more candidates
    strong_touches: 5       # Strong support classification
    moderate_touches: 3     # was 4 — aligned with relaxed min_touches

  # Reference to RSI thresholds
  rsi_config_file: "config/rsi_thresholds.yaml"

  # ===========================================================================
  # STABILITY-FIRST FILTERING
  # ===========================================================================
  # Simplified 2-tier system (was 4 tiers — reduced to avoid triple-counting
  # with ranking stability_weight + analyzer-level DQ).
  #   Qualified (≥60): min_score 3.5 — signal quality drives ranking
  #   Blacklist (<60): rejected — insufficient historical reliability

  stability_tiers:
    qualified:
      threshold: 60.0
      min_score: 3.5       # signal quality matters more than stability tier

  # Legacy stability boost (preserved for backwards compat)
  stability_boost:
    threshold: 70.0         # Score above which boost applies
    amount: 1.0             # Base boost amount
    premium_multiplier: 0.5   # Boost multiplier for stability ≥80
    good_multiplier: 0.25     # Boost multiplier for stability ≥70
    premium_score: 80         # Stability score for premium boost

  # ===========================================================================
  # WIN RATE INTEGRATION
  # ===========================================================================
  # Formula: adjusted_score = base_score * (base_multiplier + win_rate / divisor)
  # WR=90%: 0.7 + 0.30 = 1.0 (full strength)
  # WR=70%: 0.7 + 0.23 = 0.93 (slight reduction)
  # WR=50%: 0.7 + 0.17 = 0.87 (stronger reduction)

  win_rate:
    base_multiplier: 0.7
    divisor: 300.0

  # ===========================================================================
  # DRAWDOWN PENALTY
  # ===========================================================================
  # Score reduced proportionally for high average drawdown.
  # penalty = (drawdown - threshold) * per_pct, capped at max_penalty_pct

  drawdown:
    penalty_threshold: 10.0   # Start penalizing above this avg drawdown %
    penalty_per_pct: 0.02     # Score reduction per % over threshold
    max_penalty_pct: 0.3      # Cap: max 30% score reduction

  # ===========================================================================
  # FUNDAMENTALS PRE-FILTER
  # ===========================================================================
  # Applied BEFORE the scan to reject clearly unsuitable symbols.

  fundamentals_prefilter:
    min_stability: 50.0       # Pre-filter: below stability_qualified_threshold (60)
    min_win_rate: 65.0        # Minimum historical win rate %
    max_volatility: 70.0      # Max historical volatility (annualized %)
    max_beta: 2.0             # Max beta to SPY
    iv_rank_min: 20.0         # Looser than ENTRY_IV_RANK_MIN (pre-filter)

  # ===========================================================================
  # ADJUSTMENT REASON LABELS
  # ===========================================================================
  # Thresholds for human-readable adjustment reason text.

  adjustment_labels:
    win_rate:
      excellent: 90
      very_good: 85
      low: 75
    drawdown:
      high: 15
      low: 5
    stability:
      very_stable: 80

  # ===========================================================================
  # OUTPUT LIMITS
  # ===========================================================================

  output:
    max_results_per_symbol: 3
    max_total_results: 50
    max_symbol_appearances: 2
    min_data_points: 60
    pool_size_per_strategy: 5

